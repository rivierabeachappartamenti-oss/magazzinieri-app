  /* ---------- STOCK / RISCONTRO (Consultazione in sala) ---------- */
  // Requisito 5 вЂ” aggancio dinamico listino (sala) в†” magazzino (inventario) per NOME
  function mergeQ(a,b){
    const out=(a||[]).map(x=>({n:x.n, unita:x.unita}));
    (b||[]).forEach(p=>{ const e=out.find(x=>x.unita===p.unita); if(e) e.n+=p.n; else out.push({n:p.n, unita:p.unita}); });
    return out;
  }
  function buildInvMap(inv){
    const map={};
    (inv.righe||[]).forEach(r=>{
      const key=sig(r.nome); if(!key) return;   // firma ordinata: В«Coca ColaВ» e В«Cola CocaВ» stessa chiave
      if(!map[key]) map[key]={ quantita:mergeQ([], r.quantita), righe:[r] };
      else { map[key].quantita=mergeQ(map[key].quantita, r.quantita); map[key].righe.push(r); }
    });
    return map;
  }
  // DIVIDE PER SALA вЂ” le righe di magazzino di UNA corsia sono SOLO quelle dettate per lei (ambito === corsia): ogni
  // magazzino mostra esattamente ciГІ che ГЁ stato dettato lГ¬, niente di piГ№ (decisione committente). Righe di altre
  // corsie non entrano; se lo stesso prodotto ГЁ dettato in due corsie, compare in entrambe con la propria quantitГ .
  function righeCorsia(inv, c){ return (inv.righe||[]).filter(r=> r.ambito===c.id); }
  // A5 вЂ” dopo la sovrascrittura dell'inventario le righe ricevono nuovi id: trasferisce gli agganci manuali
  // (linkId) dal vecchio id al nuovo per FIRMA del nome, cosГ¬ un aggancio fatto a mano sopravvive alla conta
  // successiva (es. Mozzarellaв†”Mozarella). Se il prodotto non ГЁ piГ№ nel nuovo inventario, purgeLinkOrfani lo toglie.
  function remapLinkManuali(oldRighe, newRighe){
    const oldById=new Map((oldRighe||[]).map(r=>[r.id,r]));
    const newBySig=new Map(); (newRighe||[]).forEach(r=>{ const base=(parseRiga(r.nome).nome||r.nome); const k=sig(base); if(!k) return; if(!newBySig.has(k)) newBySig.set(k, []); newBySig.get(k).push(r); });
    (U().corsie||[]).forEach(c=> (c.scaffali||[]).forEach(sc=> (sc.voci||[]).forEach(v=>{
      if(!v.linkId) return;
      const oldR=oldById.get(v.linkId); if(!oldR) return;   // giГ  verso una riga corrente/ignota: lascia decidere purge
      const baseOld=(parseRiga(oldR.nome).nome||oldR.nome); const cand=newBySig.get(sig(baseOld)); if(!cand||!cand.length) return;
      // #4 вЂ” con piГ№ righe omonime in ambiti diversi (tolto il dedup cross-corsia), scegli quella della corsia della
      // voce, poi quella dell'ambito precedente, poi la prima: l'aggancio manuale resta sul magazzino giusto.
      const pick=cand.find(r=>r.ambito===c.id) || cand.find(r=>r.ambito===oldR.ambito) || cand[0];
      v.linkId=pick.id;
    })));
  }
  // BUG3 вЂ” ripulisce gli agganci fantasma: rimuove da ogni voce di sala il linkId che non punta piГ№
  // a una riga di magazzino esistente (riga eliminata). CosГ¬ il riscontro non conserva MAI un
  // riferimento a righe non piГ№ presenti in inv.righe. Da chiamare prima di ricalcolare lo Stock.
  function purgeLinkOrfani(inv){
    const vivi=new Set((inv&&inv.righe?inv.righe:[]).map(r=>r.id));
    (U().corsie||[]).forEach(c=> (c.scaffali||[]).forEach(sc=> (sc.voci||[]).forEach(v=>{
      if(v.linkId && !vivi.has(v.linkId)) delete v.linkId;
    })));
  }
  // riscontro di una voce di sala: prima l'aggancio manuale (linkId), poi il nome
  // Aggancio UNO-A-UNO per una corsia: ogni prodotto di magazzino (chiave) va ad AL PIГ™ una voce di sala,
  // e ogni voce ad al piГ№ un prodotto вЂ” cosГ¬ NIENTE si aggancia a due cose (nessuna quantitГ  contata due volte).
  // PrioritГ : aggancio manuale (linkId), poi esatto/riordinato (1), poi omissione dei riempitivi (0.97);
  // assegnati per punteggio decrescente senza mai riusare un prodotto giГ  agganciato. Ritorna match e usedRighe.
  function abbinaCorsia(c, inv, map){
    const match=new Map(), takenKey=new Set(), voci=[];
    (c.scaffali||[]).forEach(sc=> (sc.voci||[]).forEach(v=> voci.push(v)));
    // 1) agganci manuali: prioritГ  assoluta, bloccano il prodotto
    voci.forEach(v=>{
      if(!v.linkId) return;
      const r=(U().inv.righe||[]).find(x=>x.id===v.linkId);   // #1 вЂ” l'aggancio MANUALE si risolve sull'inventario INTERO (non lo scoped invC): un link esplicito vale anche se la riga ГЁ non attribuita (AMB_GEN) o di un'altra corsia. Solo l'auto-match per nome resta scoped.
      if(!r){ return; }   // niente delete (abbinaCorsia resta PURA): la pulizia dei veri orfani ГЁ di purgeLinkOrfani (sull'inv intero).
      const k=sig(r.nome);
      if(k && takenKey.has(k)) return;      // prodotto giГ  agganciato (a mano) a un'altra voce: uno-a-uno
      const grp=map[k];
      match.set(v, grp ? {quantita:grp.quantita, rigaIds:grp.righe.map(x=>x.id)} : {quantita:r.quantita||[], rigaIds:[r.id]});
      if(k) takenKey.add(k);
    });
    // 2) candidati per nome (esatto=1, refuso di 1 lettera a paritГ  di lunghezzaв‰€0.9, omissione riempitivi=0.97), assegnazione uno-a-uno per punteggio decrescente
    const keys=Object.keys(map), pairs=[];
    voci.forEach(v=>{
      if(match.has(v) || v.noMatch) return;   // A10 вЂ” В«nessun riscontroВ» forzato a mano: non abbinare automaticamente
      // A9 вЂ” l'aggancio confronta il nome di sala ripulito da parseRiga: il FORMATO resta (litri/grammi/chili, ora
      // tenuto anche in magazzino в†’ i due lati sono simmetrici e В«1 litroВ»в‰ В«2 litriВ»), mentre eventuali quantitГ 
      // d'imballo dettate per errore nel nome di sala vengono tolte dal confronto. Il display della voce resta intero.
      const vs=sig((parseRiga(v.nome).nome)||v.nome); if(!vs) return;
      const A=vs.split(' ').filter(Boolean);
      keys.forEach(k=>{ const s=(k===vs)?1:matchScore(A, k.split(' ')); if(s>=0) pairs.push({v,k,s}); });
    });
    pairs.sort((a,b)=> b.s-a.s);
    const voceDone=new Set();
    pairs.forEach(p=>{
      if(voceDone.has(p.v) || takenKey.has(p.k)) return;
      const grp=map[p.k];
      match.set(p.v, {quantita:grp.quantita, rigaIds:grp.righe.map(r=>r.id)});
      voceDone.add(p.v); takenKey.add(p.k);
    });
    const usedRighe=new Set();
    match.forEach(m=> m.rigaIds.forEach(id=>usedRighe.add(id)));
    return { match, usedRighe };
  }
  function renderStock(){
    const c=corsia(); const inv=U().inv;
    purgeLinkOrfani(inv);              // BUG3 вЂ” nessun aggancio fantasma sopravvive: si ricalcola sempre dal vivo
    // DIVISO PER SALA: lo Stock considera SOLO il magazzino di QUESTA corsia (ambito === corsia); le righe di altre
    // corsie e quelle non attribuite non compaiono qui (l'aggancio a mano puГІ perГІ attingere anche alle non attribuite).
    const invC={ righe:righeCorsia(inv, c) };
    const map=buildInvMap(invC);
    // aggancio UNO-A-UNO: nessun prodotto di magazzino finisce su due voci di sala
    const {match, usedRighe}=abbinaCorsia(c, invC, map);
    let agganci=0, senza=0;
    c.scaffali.forEach(sc=> sc.voci.forEach(v=>{ if(match.has(v)) agganci++; else senza++; }));
    const hasData=invC.righe.length>0;

    setTopbar({ back:true, onBack:()=>go('corsia'),
      titleHTML:'<div class="tb-title">'+esc(c.nome)+'</div>',
      subHTML:'<div class="tb-sub">Riscontro magazzino В· '+esc(c.fresh.label.replace('Inventario: ',''))+'</div>',
      right:'<button class="iconbtn" id="fBtn" aria-label="Filtro mancanti" style="width:auto;padding:0 12px;font-weight:700;font-size:13px;'+
        (S.filter?'color:var(--blu)':'color:var(--ink2)')+'">Solo mancanti</button>' });
    topbar.querySelector('#fBtn').onclick=()=>{ S.filter=!S.filter; render(); };

    const note=document.createElement('div'); note.className='stock-note';
    note.innerHTML = hasData
      ? IC.box+esc(agganci+' voci agganciate В· '+senza+' senza riscontro dal magazzino')
      : IC.box+'Nessun inventario abbinato a questa corsia';
    screen.appendChild(note);

    if(!hasData){
      screen.insertAdjacentHTML('beforeend','<div class="empty-note">Concludi un inventario in Magazzino per vedere qui le quantitГ  riscontrate sotto ogni scaffale.</div>');
    }

    // REQ вЂ” confronto DIVISO PER SCAFFALE, ciascuno nell'ordine di dettatura (inserimento). Ogni scaffale ГЁ
    // una <section> con la propria intestazione seguita SOLO dalle sue voci: la voce non si stacca mai dal
    // suo scaffale (nemmeno con В«Solo mancantiВ»). Mai riordinare per stato/quantitГ .
    c.scaffali.forEach(sc=>{
      const rows=[];
      sc.voci.forEach(v=>{
        const m=match.get(v)||null;
        const has=!!m, zero=has && qIsZero(m.quantita);
        if(S.filter && !(zero || !has)) return;   // В«Solo mancantiВ»: riscontro 0 o assente
        rows.push(stockRow(v, m, has, zero));
      });
      if(!rows.length) return;   // scaffale senza righe da mostrare (per il filtro): intestazione omessa, voci mai spostate altrove
      const sec=document.createElement('section'); sec.className='shelf-sec';
      const title=document.createElement('div'); title.className='shelf-title';
      // intestazione dello scaffale + conteggio discreto В«(n voci)В» (non maiuscolo, per leggibilitГ )
      title.innerHTML=esc(sc.titolo)+
        '<span style="text-transform:none;font-weight:600;font-size:11.5px;color:var(--ink2);margin-left:8px;letter-spacing:.02em">('+
        rows.length+(rows.length===1?' voce':' voci')+')</span>';
      sec.appendChild(title);
      rows.forEach(r=>sec.appendChild(r));
      screen.appendChild(sec);
    });

    // Sezione finale: righe di magazzino (di QUESTA corsia) che non agganciano alcuna voce di sala
    const soli=invC.righe.filter(r=>!usedRighe.has(r.id));
    if(soli.length && !S.filter){
      screen.insertAdjacentHTML('beforeend','<div class="section-h">Solo in magazzino В· non nel listino</div>');
      soli.forEach(r=>{
        const row=document.createElement('div'); row.className='da-item';
        // stessa semantica di В«esauritoВ» di stockRow(): una riga a quantitГ  zero non ГЁ un badge verde
        const zero=qIsZero(r.quantita);
        const q=zero ? '0 В· esaurito' : (fmtQuantita(r.quantita)||'presente');
        row.innerHTML='<span class="stockbadge '+(zero?'zero':'has')+'">'+IC.box+esc(q)+'</span><span class="n">'+esc(r.nome)+'</span>';
        const btn=document.createElement('button'); btn.className='assign-btn'; btn.textContent='Assegna';
        btn.setAttribute('aria-label','Aggancia В«'+r.nome+'В» a una voce di sala');
        btn.onclick=()=>assignSheet(c, r); row.appendChild(btn); screen.appendChild(row);
      });
    }

    actionbar.className='actionbar';
    actionbar.innerHTML='<button class="btn btn-primary" id="sBack">'+IC.back+'Torna a modifica</button>';
    actionbar.querySelector('#sBack').onclick=()=>go('corsia');
  }
  function stockRow(v, m, has, zero){
    const row=document.createElement('div'); row.className='voce';
    const nm=document.createElement('div'); nm.className='voce-name'; nm.style.cursor='default'; nm.textContent=v.nome;
    row.appendChild(nm);
    if(!has){
      row.insertAdjacentHTML('beforeend','<span class="stockbadge nodata" style="font-size:12px;font-weight:650;white-space:normal;text-align:right;max-width:56%">Nessun riscontro dal magazzino</span>');
    } else if(zero){
      row.insertAdjacentHTML('beforeend','<span class="miss-dot"></span><span class="stockbadge zero">'+IC.box+'0 В· esaurito</span>');
    } else {
      row.insertAdjacentHTML('beforeend','<span class="stockbadge has">'+IC.box+esc(fmtQuantita(m.quantita)||'presente')+'</span>');
    }
    // A10 вЂ” menu per correggere il riscontro a mano (scollega / cambia / ripristina automatico)
    if((U().inv.righe||[]).length){
      const kb=document.createElement('button'); kb.className='rowbtn'; kb.innerHTML=IC.kebab; kb.setAttribute('aria-label','Correggi il riscontro');
      kb.onclick=()=>riscontroMenu(v); row.appendChild(kb);
    }
    return row;
  }
  // A10 вЂ” correzione manuale del riscontro di una voce di sala
  function riscontroMenu(v){
    const items=[];
    if(v.noMatch){
      items.push({label:'Ripristina riscontro automatico', icon:IC.check, onClick:()=>{ delete v.noMatch; render(); }});
    } else {
      items.push({label:'Cambia riscontroвЂ¦', icon:IC.box, onClick:()=>riscontroPicker(v)});
      items.push({label:'Nessun riscontro (scollega)', icon:IC.trash, danger:true, onClick:()=>{ delete v.linkId; v.noMatch=true; render(); toast('В«'+v.nome+'В»: nessun riscontro dal magazzino'); }});
    }
    bottomSheet('Riscontro di В«'+v.nome+'В»', 'Correggi a mano l\'abbinamento con il magazzino.', items);
  }
  function riscontroPicker(v){
    const c=corsia();
    const righe=(U().inv.righe||[]).filter(r=> r.ambito===c.id || r.ambito===AMB_GEN);   // #3 вЂ” per l'aggancio a mano offri il magazzino di questa corsia PIГ™ le righe non attribuite (da conta totale): agganciandole le attribuisci a questa corsia
    if(!righe.length){ toast('Nessuna riga di magazzino da agganciare'); return; }
    const items=righe.map(r=>{ const q=fmtQuantita(r.quantita); return { label:r.nome+(q?'  ('+q+')':''), icon:IC.box,
      onClick:()=>{ v.linkId=r.id; r.ambito=c.id; delete v.noMatch; salvaDati(); render(); toast('В«'+v.nome+'В» agganciato a '+r.nome); } }; });
    bottomSheet('Aggancia В«'+v.nome+'В» aвЂ¦', 'Scegli la riga di magazzino (di questa corsia o non ancora attribuita).', items);
  }
  // В«AssegnaВ»: aggancio manuale voceв†’riga (imposta v.linkId, senza rinominare)
  function assignSheet(c, riga){
    const items=[];
    c.scaffali.forEach(sc=> sc.voci.forEach(v=> items.push({
      label:v.nome+'  ('+sc.titolo+')',
      onClick:()=>{ delete v.noMatch; v.linkId=riga.id; riga.ambito=c.id; salvaDati(); render(); toast('В«'+riga.nome+'В» agganciato a '+v.nome); }   // A10 + divide-per-sala: annulla В«nessun riscontroВ» e ATTRIBUISCE la riga a questa corsia
    })));
    bottomSheet('Assegna В«'+riga.nome+'В»', 'Scegli la voce di sala a cui agganciare questa riga di magazzino (senza rinominarla).', items);
  }

  /* ---------- INVENTARIO: avvio con selezione d'ambito, annullamento ---------- */
  // Avvio: NON cancella nulla (cancellazione differita, В§1.8.14). La sessione accumula in
  // inv.staging; l'inventario precedente resta consultabile in sala finchГ© non si conclude.
  function avviaInventario(ambito, ambitoNome){
    const inv=U().inv;
    inv.active=true; inv.ambito=ambito; inv.ambitoNome=ambitoNome;
    inv.staging=[]; inv.iniziata=oraOra();
    render();
    toast(ambito==='ALL' ? 'Inventario totale avviato' : ('Inventario avviato В· '+ambitoNome));
  }
  // Selezione preliminare d'ambito (В§1.8.13): una corsia di sala, oppure tutte le corsie.
  function startInventoryDialog(){
    const u=U();
    if(!u.corsie.length){ avviaInventario('ALL','Tutte le corsie'); return; }   // nessuna corsia: solo totale
    const items=[];
    u.corsie.forEach(c=>{ items.push({ label:c.nome, icon:IC.box,
      onClick:()=>avviaInventario(c.id, c.nome) }); });
    items.push({ label:'Tutte le corsie вЂ” inventario totale', icon:IC.trash, danger:true,
      onClick:()=>confermaTotale() });
    bottomSheet('Nuovo inventario di magazzino',
      'Scegli l\'ambito. Una corsia: sovrascrivi solo quella. Tutte le corsie: azzeri tutto e rifai da capo.',
      items);
  }
  function confermaTotale(){
    modal('<h3>Inventario di TUTTE le corsie?</h3><p>Alla conclusione verranno <b>azzerate tutte le quantitГ </b> '+
      'dell\'inventario precedente di tutte le tue corsie, e l\'inventario risulterГ  rifatto da capo. '+
      'FinchГ© non concludi, i dati attuali restano al loro posto.</p>',
      [ {label:'Annulla'},
        {label:'SГ¬, inventario totale', cls:'danger', onClick:()=>avviaInventario('ALL','Tutte le corsie') } ]);
  }
  // Annullamento della sessione in corso: scarta lo staging, l'inventario committato resta invariato.
  function annullaInventario(){
    if(S.magRecording){ S.magRecording=false; Speech.stop(); }  // G-F4 вЂ” stop PRIMA del modal
    const inv=U().inv; const n=inv.staging.length;
    modal('<h3>Annullare l\'inventario in corso?</h3><p>Le <b>'+n+'</b> voci dettate in questa sessione '+
      'verranno scartate. L\'inventario precedente resta invariato.</p>',
      [ {label:'Continua a dettare'},
        {label:'SГ¬, annulla', cls:'danger', onClick:()=>{
          inv.staging=[]; inv.active=false; inv.ambito=null; inv.ambitoNome='';
          render(); toast('Inventario annullato'); }} ]);
  }
  // В«Modifica l'ultimo inventarioВ»: riapre il committato come sessione totale attiva (con В«ConcludiВ»),
  // cosГ¬ si puГІ correggere l'ultimo inventario senza ripartire da zero. Concludendo, sovrascrive tutto.
  function riapriUltimoInventario(){
    const inv=U().inv;
    inv.active=true; inv.ambito='ALL'; inv.ambitoNome='Tutte le corsie';
    inv.staging=staginaDaRighe(inv); inv.iniziata=oraOra();
    render(); toast('Inventario riaperto per modifica');
  }

  /* ---------- MAGAZZINO (Inventario) ---------- */
  function renderMagazzino(){
    const u=U(); const inv=u.inv;
    setTopbar({ back:true, onBack:()=>go('home',{homeTab:'sala'}),
      titleHTML:'<div class="tb-title">Magazzino</div>',
      subHTML:'<div class="tb-sub">Settore '+esc(u.settore)+'</div>' });

    if(inv.active){
      // SESSIONE IN CORSO вЂ” si detta nel blocco di staging; l'ambito ГЁ mostrato nel banner.
      const banner=document.createElement('div'); banner.className='inv-banner';
      const recDot = S.magRecording ? '<span class="rec-live"></span>' : '';
      banner.innerHTML=recDot+'<span class="txt"><b>Inventario in corso</b>'+
        '<small>'+esc(inv.ambitoNome||inv.settore)+' В· iniziato '+esc(inv.iniziata)+'</small></span>'+
        '<span class="inv-count">'+inv.staging.length+'</span>';
      screen.appendChild(banner);

      const wrap=document.createElement('div');
      const hint=document.createElement('div'); hint.className='dict-area';
      hint.innerHTML= S.magRecording
        ? '<span class="dict-sim" style="color:var(--rec);background:var(--mancante-bg)"><span class="rec-live" style="width:9px;height:9px;border-radius:50%;background:var(--rec);display:inline-block"></span>In ascolto вЂ” dettatura in corsoвЂ¦</span>'
        : speechBadge('mag');
      wrap.appendChild(hint);
      // Percorso di autorizzazione / avviso di incompatibilitГ  del microfono
      if(!Speech.supported){
        wrap.insertAdjacentHTML('beforeend','<div class="dict-info">Il riconoscimento vocale non ГЁ disponibile su questo browser. '+
          'Usa Chrome su Android. Puoi comunque inserire le voci con la tastiera.</div>');
      } else if(Speech.permesso!=='granted' && !S.magRecording){
        wrap.appendChild(micAuthButton(()=>startMagDictation()));   // permesso concesso в†’ avvia subito la dettatura
      }
      // Promemoria d'ambito nella modalitГ  settoriale: si detta SOLO ciГІ che appartiene alla corsia.
      if(inv.ambito!=='ALL'){
        wrap.insertAdjacentHTML('beforeend','<div class="dict-info">Detta solo le voci di <b>'+esc(inv.ambitoNome)+
          '</b>. Alla conclusione viene sovrascritta questa corsia; lo stesso prodotto eventualmente contato in un\'altra corsia viene ricondotto qui, per non contarlo due volte.</div>');
      }
      inv.staging.forEach(r=> wrap.appendChild(magRow(r)) );
      // R3 вЂ” riga provvisoria: mostra in diretta ciГІ che il motore sta scrivendo (solo durante l'ascolto)
      const mprov=document.createElement('div'); mprov.className='voce'; mprov.id='magProvRow'; mprov.style.display='none';
      mprov.innerHTML='<div class="voce-name provisional" id="magProvText"></div>';
      wrap.appendChild(mprov);
      const add=document.createElement('button'); add.className='addbtn'; add.innerHTML=IC.plus+'Aggiungi voce';
      add.onclick=()=>{ const nr={id:nid(), nome:'Nuova voce', quantita:[], raw:'Nuova voce'}; inv.staging.push(nr); S.magRecording=false; buzz(); render();   // C-R3 вЂ” vibrazione anche su commit manuale (Aggiungi voce)
        const el=[...screen.querySelectorAll('.voce-name')].find(n=>n.dataset.rid===nr.id);
        if(el) editMagRow(el, nr); };
      wrap.appendChild(add);
      screen.appendChild(wrap);

      actionbar.className='actionbar col';
      const dettaDisabled = !Speech.supported;
      actionbar.innerHTML=
        '<div style="display:flex;gap:10px;width:100%">'+
          '<button class="btn btn-rec" id="mDetta"'+(dettaDisabled?' aria-disabled="true" style="opacity:.5;cursor:default"':'')+'>'+IC.mic+(S.magRecording?'Ferma':'Detta')+'</button>'+
          '<button class="btn btn-primary" id="mClose">'+IC.check+'Concludi</button>'+
        '</div>'+
        '<button class="btn btn-danger-soft" id="mCancel">'+IC.trash+'Annulla inventario</button>';
      if(!dettaDisabled) actionbar.querySelector('#mDetta').onclick=()=>magDictate();
      actionbar.querySelector('#mClose').onclick=()=>closeInventory();
      actionbar.querySelector('#mCancel').onclick=()=>annullaInventario();
    } else {
      // NESSUNA SESSIONE вЂ” riepilogo dell'ultimo inventario committato + avvio con selezione d'ambito.
      const righe=inv.righe||[];
      if(righe.length){
        const info=document.createElement('div'); info.className='stock-note';
        info.innerHTML=IC.box+esc('Ultimo inventario di magazzino: '+righe.length+(righe.length===1?' voce registrata':' voci registrate'));
        screen.appendChild(info);
        // elenco di sola lettura, raggruppato per corsia d'ambito
        const wrap=document.createElement('div');
        const perAmb={};
        righe.forEach(r=>{ const k=r.ambito||AMB_GEN; (perAmb[k]=perAmb[k]||[]).push(r); });
        const nomeAmb=(k)=>{ if(k===AMB_GEN) return 'Non nel listino di sala';
          const c=(u.corsie||[]).find(x=>x.id===k); return c?c.nome:'Corsia rimossa'; };
        Object.keys(perAmb).forEach(k=>{
          wrap.insertAdjacentHTML('beforeend','<div class="section-h">'+esc(nomeAmb(k))+'</div>');
          perAmb[k].forEach(r=>{
            const row=document.createElement('div'); row.className='voce';
            const q=fmtQuantita(r.quantita);
            row.innerHTML='<div class="voce-name" style="cursor:default">'+esc(q?(r.nome+' вЂ” '+q):r.nome)+'</div>';
            wrap.appendChild(row);
          });
        });
        screen.appendChild(wrap);
      } else {
        screen.insertAdjacentHTML('beforeend','<div class="empty-note" style="padding-top:40px">Nessun inventario ancora registrato per il settore <b>'+esc(u.settore)+'</b>.<br>Avvia una sessione scegliendo l\'ambito (una corsia o tutte).</div>');
      }
      actionbar.className='actionbar'+(righe.length?' col':'');
      actionbar.innerHTML='<button class="btn btn-primary" id="mStart">'+IC.plus+'Nuovo inventario</button>'+
        (righe.length?'<button class="btn" id="mResume">'+IC.pencil+'Modifica l\'ultimo inventario</button>':'');
      actionbar.querySelector('#mStart').onclick=()=>startInventoryDialog();
      if(righe.length) actionbar.querySelector('#mResume').onclick=()=>riapriUltimoInventario();
    }
  }
  function magRow(r){
    const row=document.createElement('div'); row.className='voce';
    const nm=document.createElement('div'); nm.className='voce-name'; nm.dataset.rid=r.id;
    const q=fmtQuantita(r.quantita);
    nm.textContent = q ? (r.nome+' вЂ” '+q) : r.nome;   // В«nome вЂ” 2 cartoni + 5 pezziВ»
    nm.onclick=()=>editMagRow(nm, r);
    const kb=document.createElement('button'); kb.className='rowbtn'; kb.innerHTML=IC.trash; kb.setAttribute('aria-label','Elimina voce');
    kb.onclick=()=>{
      const inv=U().inv; const i=inv.staging.indexOf(r); if(i<0) return;
      // FUNZIONE D/D2 вЂ” se si sta dettando, ricostruire senza fermare il riconoscimento (come flashMagRow)
      const rebuild=()=>{ if(S.magRecording){ keepSpeech=true; try{ render(); } finally { keepSpeech=false; } try{ screen.scrollTop=screen.scrollHeight; }catch(e){} } else render(); };  // G-F6
      inv.staging.splice(i,1); rebuild();
      snackbar('Voce eliminata','Annulla',()=>{ inv.staging.splice(Math.min(i,inv.staging.length),0,r); rebuild(); });
    };
    row.appendChild(nm); row.appendChild(kb); return row;
  }
  // correzione inline: si modifica il testo grezzo e si riesegue parseRiga
  function editMagRow(nm, r){
    const inp=document.createElement('input'); inp.className='inline-edit'; inp.value=r.raw||r.nome;
    nm.replaceWith(inp); inp.focus(); inp.select();
    let fin=false;
    const done=(save)=>{ if(fin)return; fin=true; const v=inp.value.trim();
      if(save && v){ const p=parseRiga(v); r.nome=cap(p.nome); r.quantita=p.quantita; r.raw=v; }
      // FUNZIONE D вЂ” correggere una riga durante la dettatura di magazzino NON deve fermare il riconoscimento:
      // render() (keepSpeech=false) chiamerebbe Speech.stop() lasciando perГІ S.magRecording=true (UI В«in ascoltoВ» ma motore fermo).
      if(S.magRecording){ keepSpeech=true; try{ render(); } finally { keepSpeech=false; } try{ screen.scrollTop=screen.scrollHeight; }catch(e){} } else render(); };  // G-F6
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();done(true);} else if(e.key==='Escape'){done(false);} });
    inp.addEventListener('blur',()=>done(true));
  }
  function magDictate(){
    if(S.magRecording){ Speech.stop(); S.magRecording=false; render(); return; }  // toggle: ferma
    if(!Speech.supported){ return; }                          // pulsante disabilitato: nessuna azione
    if(Speech.permesso==='granted'){ startMagDictation(); return; }
    // Permesso non concesso: passa dalla richiesta prima di Speech.start()
    Speech.richiediPermesso(()=>startMagDictation(), ()=>micBloccatoModal());
  }
  // Avvio effettivo del riconoscimento vocale reale in magazzino
  function startMagDictation(){
    if(!Speech.supported || S.magRecording) return;
    S.magRecording=true; render();
    Speech.start(
      (interim)=>{ showMagProv(interim); },                     // R3 вЂ” anteprima in diretta anche in magazzino
      (finalTxt)=>{ hideMagProv(); magCommit(finalTxt); },
      ()=>{ S.magRecording=false; render(); }                  // avvio fallito: torna allo stato di riposo
    );
  }
  // R3 вЂ” riga provvisoria di magazzino (ricreata nascosta ad ogni render: si riespone al prossimo interim)
  function showMagProv(txt){ const r=document.getElementById('magProvRow'), t=document.getElementById('magProvText');
    if(r){ r.style.display='flex'; t.textContent=txt; scrollRowIntoView(r); } }
  function hideMagProv(){ const r=document.getElementById('magProvRow'); if(r){ r.style.display='none'; } }
  // R3 вЂ” re-render leggero (Speech attivo) + flash e scorrimento sulla riga interessata
  function flashMagRow(id){
    buzz();   // B2 вЂ” conferma tattile in magazzino
    if(editingInline()){ salvaDati(); return; }   // B1 вЂ” non ricostruire il DOM mentre si corregge da tastiera (la voce ГЁ giГ  nello staging)
    keepSpeech=true; try{ render(); } finally { keepSpeech=false; }  // G-F6
    // BUG2/2b вЂ” dopo la ricostruzione ancora la vista al fondo, poi scorrimento istantaneo sulla riga.
    try{ screen.scrollTop=screen.scrollHeight; }catch(e){}
    const el=[...screen.querySelectorAll('.voce-name')].find(n=>n.dataset.rid===id);
    if(el){
      if(!REDUCED) el.closest('.voce').classList.add('flash');
      scrollRowIntoView(el.closest('.voce'));
    }
  }
  // un risultato finale reale -> parseRiga -> oggetto strutturato in inv.righe
  function magCommit(txt){
    const inv=U().inv; const p=parseRiga(txt);
    const nomeVuoto = !p.nome || !p.nome.trim();
    const last = inv.staging.length ? inv.staging[inv.staging.length-1] : null;

    // R2 вЂ” quantitГ  dette DOPO una pausa (risultato finale separato, senza nome): allacciarle all'ultima riga
    if(nomeVuoto && p.quantita.length>0){
      if(last){
        last.quantita = mergeQ(last.quantita, p.quantita);     // stessa unitГ : somma; altrimenti nuova coppia
        last.raw = (last.raw ? last.raw+' ' : '') + txt;
        tsCommitMag=Date.now();
        flashMagRow(last.id);
        return;
      }
      toast('Di\' prima il nome del prodotto');                // nessuna riga a cui allacciare
      return;
    }
    // R2 (simmetrico) вЂ” nome detto dopo, per completare un'ultima riga rimasta senza nome ma con quantitГ 
    if(!nomeVuoto && p.quantita.length===0 && last && (!last.nome || !last.nome.trim()) && last.quantita.length>0){
      last.nome = cap(p.nome);
      last.raw = (last.raw ? last.raw+' ' : '') + txt;
      tsCommitMag=Date.now();
      flashMagRow(last.id);
      return;
    }

    // BUG1/1b вЂ” rete di sicurezza BIDIREZIONALE: doppione residuo del motore. Se l'ultima riga ГЁ
    // recente (< 6 s) e il suo testo normalizzato ГЁ prefisso del nuovo OPPURE il nuovo ГЁ prefisso del
    // vecchio (inclusa uguaglianza), NON si aggiunge una riga: si tiene la versione piГ№ lunga.
    const ntM=norm(txt), ltM=last ? norm(last.raw||last.nome) : '';
    if(last && ltM && ntM && (ntM.indexOf(ltM)===0 || ltM.indexOf(ntM)===0)
       && (Date.now()-tsCommitMag) < FINESTRA_DOPPIONE_MS){
      if(ntM.length>=ltM.length){ last.nome=cap(p.nome); last.quantita=p.quantita; last.raw=txt; }
      tsCommitMag=Date.now();
      flashMagRow(last.id);
      return;
    }

    const nr={id:nid(), nome:cap(p.nome), quantita:p.quantita, raw:txt};
    inv.staging.push(nr);
    tsCommitMag=Date.now();
    flashMagRow(nr.id);
  }
  // Conclusione: applica la sovrascrittura secondo l'ambito, poi il resoconto sull'ambito.
  function closeInventory(forceEmpty){
    const u=U(); const inv=u.inv;
    if(!inv.active){ return; }
    // A8 вЂ” se si sta ancora dettando, ferma il motore e SVUOTA il buffer di frase (flushFrase ГЁ sincrona):
    // l'ultima frase entra nello staging PRIMA che venga letto, cosГ¬ concludere in fretta non la perde.
    if(S.magRecording){ S.magRecording=false; Speech.stop(); }
    if(!inv.staging.length && forceEmpty!==true){
      // A7 вЂ” concludere senza voci SVUOTA l'ambito: una corsia davvero svuotata va potuta registrare, con conferma esplicita
      const cosa = (inv.ambito==='ALL') ? 'Tutte le corsie risulteranno senza giacenze' : 'La corsia В«'+(inv.ambitoNome||'')+'В» risulterГ  senza giacenze';
      modal('<h3>Concludere senza aver dettato voci?</h3><p>'+cosa+', e l\'inventario precedente di questo ambito verrГ  svuotato. Procedere?</p>',
        [ {label:'Annulla'}, {label:'SГ¬, svuota', cls:'danger', onClick:()=>closeInventory(true)} ], true);
      return;
    }
    const totale = (inv.ambito==='ALL');
    const scopeId = inv.ambito, scopeNome = inv.ambitoNome;
    const oldRighe = (inv.righe||[]).slice();   // A5 вЂ” snapshot per ri-mappare gli agganci manuali sui nuovi id
    // 1) ogni riga dettata riceve il proprio ambito: la corsia scelta (settoriale) o per nome (totale)
    inv.staging.forEach(r=>{ r.ambito = totale ? ambitoDaNome(u, r.nome) : scopeId; });
    // 2) sovrascrittura (В§1.8.14вЂ“15). Totale: azzera tutto e riparte dalle sole righe dettate.
    //    Settoriale: rimpiazza SOLO le righe di questa corsia (ambito === scopeId) e LASCIA INTATTE quelle delle altre
    //    corsie, anche se omonime вЂ” ogni magazzino tiene ciГІ che ГЁ stato dettato per lui (decisione committente). Il
    //    vecchio dedup cross-corsia (v1.6.20) serviva a evitare la somma nel confronto, ora giГ  impedita dallo scoping.
    if(totale){
      inv.righe = inv.staging.slice();
    } else {
      inv.righe = (inv.righe||[]).filter(r=> r.ambito!==scopeId).concat(inv.staging);
    }
    inv.staging=[]; inv.active=false; inv.ambito=null; inv.ambitoNome='';
    // G-F8: rimossa assegnazione prevData/prevCount (dead)
    remapLinkManuali(oldRighe, inv.righe);   // A5 вЂ” trasferisce gli agganci manuali dai vecchi id ai nuovi (per firma) PRIMA di ripulire gli orfani
    purgeLinkOrfani(inv);   // BUG3 вЂ” nessun aggancio fantasma sopravvive alla sovrascrittura
    // FUNZIONE C вЂ” utente senza corsie: chiusura con riepilogo essenziale, senza toccare corsie[0].
    if(!u.corsie.length){
      salvaDati();
      modal('<h3>Inventario concluso</h3><p><b>'+inv.righe.length+'</b> voci registrate.<br>'+
        'Non hai ancora corsie in sala a cui agganciare il riscontro: crea una corsia dalla Home per la consultazione.</p>',
        [ {label:'Torna alla home', cls:'primary', onClick:()=>go('home',{homeTab:'sala'}) } ], false);
      toast('Inventario concluso');
      return;
    }
    // 3) freschezza timbrata SOLO sulle corsie in ambito (settoriale = solo quella; totale = tutte).
    //    CosГ¬ l'etichetta В«Inventario: oggi вЂ¦В» non ГЁ piГ№ condivisa da corsie non inventariate.
    const corsieAmbito = totale ? u.corsie : u.corsie.filter(c=>c.id===scopeId);
    const stamp='Inventario: oggi '+oraOra();
    corsieAmbito.forEach(c=>{ c.fresh={state:'fresh', label:stamp}; });
    salvaDati();   // la modifica precede il modal: salvataggio esplicito per mantenere l'invariante
    // 4) resoconto calcolato per nome SULLE SOLE corsie in ambito. L'approdo va sulla corsia con PIГ™
    //    agganci: nel totale evita di atterrare su una corsia estranea al dettato (che mostrerebbe
    //    В«0 agganciateВ» pur avendo il resoconto contato gli agganci nelle altre); nel settoriale
    //    coincide comunque con la corsia dell'ambito (unica in esame).
    let agg=0, senza=0; const used=new Set();
    let bestC=null, bestAgg=-1;
    corsieAmbito.forEach(c=>{
      const invC={ righe:righeCorsia(inv, c) };   // DIVISO PER SALA: ogni corsia conta solo il proprio magazzino (coerente con lo Stock)
      const {match, usedRighe}=abbinaCorsia(c, invC, buildInvMap(invC));   // uno-a-uno anche nel resoconto
      let cAgg=0;
      c.scaffali.forEach(sc=> sc.voci.forEach(v=>{ if(match.has(v)){ agg++; cAgg++; } else senza++; }));
      usedRighe.forEach(id=>used.add(id));
      if(cAgg>bestAgg){ bestAgg=cAgg; bestC=c; }
    });
    const righeAmbito = totale ? inv.righe : righeCorsia(inv, {id:scopeId});   // conteggio coerente con lo Stock (settoriale: solo le righe di questa corsia; totale: tutte le righe dell'inventario)
    const soli = righeAmbito.filter(r=>!used.has(r.id)).length;
    const dest = (bestC || u.corsie[0]).id;
    modal('<h3>Inventario concluso</h3><p>Ambito: <b>'+esc(scopeNome)+'</b> В· <b>'+righeAmbito.length+'</b> voci di magazzino.<br>'+
      'Agganciate al listino di sala: <b>'+agg+'</b> В· '+
      'Voci di sala senza riscontro: <b>'+senza+'</b> В· '+
      'Solo in magazzino: <b>'+soli+'</b>.</p>',
      [ {label:'Vai alla consultazione in sala', cls:'primary', onClick:()=>{ go('corsia',{corsiaId:dest}); go('stock',{filter:false}); }},
        {label:'Torna alla home', onClick:()=>go('home',{homeTab:'sala'}) } ], false);  // G-F13 вЂ” no setTimeout(10)
    toast('Inventario concluso В· '+scopeNome);
  }

  /* ============ AVVIO ============ */
  try{ const d=new Date(); document.getElementById('clock').textContent=
    d.getHours()+':'+String(d.getMinutes()).padStart(2,'0'); }catch(e){}
  caricaDati();   // ripristina l'eventuale lavoro salvato PRIMA del primo render (mai la navigazione)
  // Flush immediato quando l'app passa in background o viene chiusa: ГЁ ciГІ che salva
  // se l'operatore chiude l'app dal task switcher senza tornare al render.
  let _stoppedOnHide=false;   // F2 вЂ” memorizza se andando in background abbiamo dovuto fermare la dettatura
  try{ document.addEventListener('visibilitychange', ()=>{
    if(document.hidden){
      // F2 вЂ” in background/blocco schermo Android termina la sessione vocale: fermiamo noi il motore (l'ultima
      // frase viene emessa) e spegniamo i flag, poi salviamo; cosГ¬ al ritorno non resta В«In ascoltoВ» col microfono morto.
      if(S.recording||S.magRecording){ try{ Speech.stop(); }catch(e){} S.recording=false; S.magRecording=false; _stoppedOnHide=true; }
      flushSalva();
    } else if(_stoppedOnHide){
      _stoppedOnHide=false;
      // solo se avevamo davvero fermato la dettatura: riallinea la UI allo stato reale (non in ascolto),
      // conservando la posizione di scorrimento (renderKeepScroll) вЂ” niente salto in cima nel caso innocente
      if(S.screen==='dettatura'||S.screen==='magazzino') renderKeepScroll();
    }
  }); }catch(e){}
  try{ window.addEventListener('pagehide', ()=>{ flushSalva(); }); }catch(e){}
  // B5 вЂ” tasto/gesto Indietro di Android: risale di una schermata nell'app (o chiude una tendina) invece di uscire.
  try{ history.replaceState({s:S.screen||'login'}, ''); }catch(e){}
  window.addEventListener('popstate', function(){
    if(_selfBack){ _selfBack=false; return; }   // B5 вЂ” popstate generata dal nostro history.back() d'uscita: lasciala passare, niente ri-arma (evita l'intrappolamento nel loop del toast)
    const ov=app.querySelector('.ov');
    if(ov){ ov.remove(); try{ history.pushState({s:S.screen}, ''); }catch(e){} return; }   // tendina/modale aperta: l'Indietro la chiude e basta
    const parent=BACK_PARENT[S.screen];
    if(parent){
      S.screen=parent; S.magRecording=false; render();
      try{ history.pushState({s:parent}, ''); }catch(e){}
      _navExitArmed=false;
    } else {
      if(_navExitArmed){ _navExitArmed=false; _selfBack=true; history.back(); }   // secondo Indietro alla radice: esci davvero, senza re-intercettare
      else { _navExitArmed=true; toast('Premi ancora Indietro per uscire'); try{ history.pushState({s:S.screen}, ''); }catch(e){} setTimeout(function(){ _navExitArmed=false; }, 2500); }
    }
  });
  render();
})();
</script>






<script>
"use strict";
/* Registrazione del service worker: l'app installata funziona anche offline. */
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js').catch(function(){ /* senza service worker l'app funziona comunque online */ });
  });
}
/* Installazione: pulsante in pagina quando possibile; altrimenti guida ad aprire in Chrome. */
(function(){
  var deferred=null, bar=null;
  var URL_APP='https://rivierabeachappartamenti-oss.github.io/magazzinieri-app/';
  var STANDALONE = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
  function setAppPad(px){ var a=document.getElementById('app'); if(a) a.style.paddingBottom = px ? (px+'px') : ''; }   // D1 вЂ” spazio sotto l'app quando la barra install ГЁ visibile, cosГ¬ non copre i pulsanti in basso
  function chiudiBar(){ if(bar){ bar.remove(); bar=null; } setAppPad(0); }

  function baseBar(){
    var el=document.createElement('div');
    el.style.cssText='position:fixed;left:12px;right:12px;bottom:12px;z-index:9999;display:flex;align-items:center;gap:10px;'+
      'background:#1B5BD7;color:#fff;border-radius:16px;padding:12px 14px;box-shadow:0 10px 30px -8px rgba(0,0,0,.45);'+
      'font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;';
    return el;
  }
  function bottone(testo){
    var b=document.createElement('button');
    b.textContent=testo;
    b.style.cssText='border:none;border-radius:12px;background:#fff;color:#1B5BD7;font-weight:800;font-size:15px;'+
      'padding:12px 16px;min-height:48px;cursor:pointer;font-family:inherit;white-space:nowrap;';
    return b;
  }
  function chiusura(){
    var x=document.createElement('button');
    x.textContent='Г—'; x.setAttribute('aria-label','Chiudi');
    x.style.cssText='border:none;background:transparent;color:#fff;font-size:22px;line-height:1;cursor:pointer;padding:8px;min-height:48px;font-family:inherit;';
    x.onclick=function(){ chiudiBar(); };
    return x;
  }
  function mostraInstalla(){
    if(bar){ bar.remove(); bar=null; }
    bar=baseBar();
    bar.innerHTML='<span style="font-size:14px;font-weight:600;flex:1;line-height:1.35">Installa lвЂ™app sul telefono:<br>icona in home e schermo intero</span>';
    var b=bottone('Installa');
    b.onclick=function(){
      if(!deferred) return;
      deferred.prompt();
      deferred.userChoice.then(function(){ deferred=null; chiudiBar(); });
    };
    bar.appendChild(b); bar.appendChild(chiusura());
    document.body.appendChild(bar);
    setAppPad(bar.getBoundingClientRect().height + 24);   // D1
  }
  function mostraApriInChrome(){
    if(bar || STANDALONE) return;
    bar=baseBar();
    var isAndroid=/Android/i.test(navigator.userAgent);
    bar.innerHTML='<span style="font-size:13.5px;font-weight:600;flex:1;line-height:1.4">Per installare lвЂ™app apri questo indirizzo con <b>Chrome</b> (qui lвЂ™installazione non ГЁ disponibile)</span>';
    if(isAndroid){
      var b=bottone('Apri in Chrome');
      b.onclick=function(){
