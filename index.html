<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1B5BD7">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>App Magazzinieri вЂ” Prototipo dimostrativo</title>
<style>
  /* ============ TOKENS ============ */
  :root{
    /* IdentitГ  dell'app (deliberata, NON segue il tema del viewer) */
    --blu:#1B5BD7; --blu-scuro:#164BAF; --rec:#C21F2E;
    --ok:#1E7B3C; --incerto:#7A5400; --mancante:#B3261E;   /* E1 вЂ” ambra scurita: contrasto AA su crema (era #9A6A00 = 4,25:1) */
    --bg:#F6F7F9; --surface:#FFFFFF; --ink:#16181D; --ink2:#5B626F;
    --line:#E4E7EC; --line2:#EDF0F4; --shelfbg:#EEF1F6;
    --ok-bg:#E7F4EC; --incerto-bg:#FBF2DD; --mancante-bg:#FBEAE8; --blu-bg:#EAF0FD;
    /* Cornice-telefono e sfondo scena: SI adattano al tema del viewer */
    --stage:#E7E9EE; --frame:#0E0F13; --frame-line:#2A2C33; --frameglow:rgba(0,0,0,.28);
  }
  @media (prefers-color-scheme: dark){
    :root{ --stage:#0B0C0F; --frame:#17181C; --frame-line:#303239; --frameglow:rgba(0,0,0,.6); }
  }
  :root[data-theme="light"]{ --stage:#E7E9EE; --frame:#0E0F13; --frame-line:#2A2C33; --frameglow:rgba(0,0,0,.28); }
  :root[data-theme="dark"]{ --stage:#0B0C0F; --frame:#17181C; --frame-line:#303239; --frameglow:rgba(0,0,0,.6); }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0; background:var(--stage);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased; color:var(--ink);
    min-height:100dvh; display:flex; align-items:center; justify-content:center;
  }
  /* ============ CORNICE TELEFONO ============ */
  .stage{ width:100%; min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .device{
    width:390px; height:min(844px, calc(100dvh - 48px));
    background:var(--frame); border-radius:44px; padding:12px;
    box-shadow:0 30px 70px -20px var(--frameglow), 0 0 0 1px var(--frame-line);
  }
  @media (max-width:460px){
    .stage{ padding:0; }
    .device{ width:100%; height:100dvh; border-radius:0; padding:0; box-shadow:none; }
  }
  .app{
    position:relative; height:100%; width:100%; background:var(--bg); overflow:hidden;
    border-radius:32px; display:flex; flex-direction:column; isolation:isolate;
  }
  @media (max-width:460px){ .app{ border-radius:0; } .statusbar{ display:none; } }

  /* ============ STATUS BAR FINTA ============ */
  .statusbar{
    height:26px; flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:0 20px; font-size:12px; font-weight:600; color:var(--ink); letter-spacing:.02em;
    background:var(--surface);
  }
  .statusbar .dots{ display:flex; gap:3px; align-items:center; }
  .statusbar .dots i{ width:6px; height:6px; border-radius:50%; background:var(--ink); display:block; opacity:.85; }

  /* ============ TOPBAR ============ */
  .topbar{
    flex:0 0 auto; min-height:58px; background:var(--surface); border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:6px; padding:8px 10px; position:relative; z-index:5;
  }
  .tb-main{ flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center; }
  .tb-title{ font-size:18px; font-weight:750; line-height:1.15; letter-spacing:-.01em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tb-sub{ font-size:12px; color:var(--ink2); font-weight:500; margin-top:1px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tb-rec{ color:var(--rec); font-weight:700; display:flex; align-items:center; gap:7px; }
  .iconbtn{
    flex:0 0 auto; width:56px; height:56px; border:none; background:transparent; color:var(--ink);
    border-radius:12px; display:grid; place-items:center; cursor:pointer;
  }
  .iconbtn:hover{ background:var(--line2); }
  .iconbtn svg{ width:24px; height:24px; }
  .avatar{
    width:38px; height:38px; border-radius:50%; background:var(--blu); color:#fff;
    display:grid; place-items:center; font-weight:750; font-size:16px; flex:0 0 auto;
  }

  /* ============ SCREEN ============ */
  .screen{ flex:1 1 auto; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
  .pad{ padding:18px 16px; }
  .h-eyebrow{ font-size:12px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--ink2); }
  .h1{ font-size:26px; font-weight:780; letter-spacing:-.02em; margin:6px 0 2px; text-wrap:balance; }
  .lead{ color:var(--ink2); font-size:14.5px; line-height:1.45; }

  /* ============ LOGIN ============ */
  .usercard{
    width:100%; text-align:left; background:var(--surface); border:1px solid var(--line);
    border-radius:16px; padding:16px; min-height:74px; display:flex; align-items:center; gap:14px;
    cursor:pointer; font:inherit; color:inherit;
  }
  .usercard:hover{ border-color:#C9D4EC; }
  .usercard .av{ width:46px; height:46px; border-radius:50%; background:var(--blu-bg); color:var(--blu);
    display:grid; place-items:center; font-weight:750; font-size:20px; }
  .usercard .un{ font-size:19px; font-weight:700; }
  .usercard .us{ font-size:13.5px; color:var(--ink2); margin-top:1px; }
  .usercard .chev{ color:var(--ink2); }
  .usercard .chev svg{width:20px;height:20px}
  .list-gap{ display:flex; flex-direction:column; gap:12px; }

  /* ============ HOME ============ */
  .seg{ display:flex; background:var(--line2); border-radius:14px; padding:4px; gap:4px; }
  .seg-btn{
    flex:1; border:none; background:transparent; font:inherit; font-weight:650; font-size:14.5px;
    color:var(--ink2); padding:12px 8px; border-radius:10px; cursor:pointer; min-height:56px;
  }
  .seg-btn[aria-selected="true"]{ background:var(--surface); color:var(--ink);
    box-shadow:0 1px 3px rgba(16,24,40,.12); font-weight:720; }
  .corsia-card{
    width:100%; text-align:left; background:var(--surface); border:1px solid var(--line);
    border-radius:16px; padding:16px; cursor:pointer; font:inherit; color:inherit;
    display:flex; flex-direction:column; gap:10px;
  }
  .corsia-card:hover{ border-color:#C9D4EC; }
  .cc-top{ display:flex; align-items:center; gap:10px; }
  .cc-name{ font-size:18px; font-weight:730; letter-spacing:-.01em; }
  .cc-meta{ font-size:13px; color:var(--ink2); margin-top:2px; }
  .cc-chev{ margin-left:auto; color:var(--ink2); }   /* collaudo v1.6.29: allineamento a destra ripristinato (qui non c'ГЁ un secondo margin auto in conflitto) */
  .cc-chev svg{width:20px;height:20px}
  .pill{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:650;
    padding:5px 10px; border-radius:999px; }
  .pill svg{ width:14px; height:14px; }
  .pill.fresh{ background:var(--ok-bg); color:var(--ok); }
  .pill.stale{ background:var(--incerto-bg); color:var(--incerto); }
  .pill.none{ background:var(--line2); color:var(--ink2); }

  /* ============ CORSIA / SALA ============ */
  .shelf-sec{ position:relative; }
  .shelf-title{
    position:sticky; top:0; z-index:3; background:var(--shelfbg);
    border-top:1px solid var(--line); border-bottom:1px solid var(--line);
    text-align:center; font-weight:800; font-size:15px; text-transform:uppercase; letter-spacing:.05em;
    padding:12px 46px; color:var(--ink); display:block; position:sticky;
  }
  .shelf-title .st-wrap{ position:relative; display:block; }
  .shelf-title .st-kebab{ position:absolute; right:-38px; top:50%; transform:translateY(-50%); }
  .voce{
    display:flex; align-items:center; gap:8px; min-height:58px; padding:8px 6px 8px 16px;
    background:var(--surface); border-bottom:1px solid var(--line2);
  }
  .voce-name{ flex:1; font-size:16.5px; line-height:1.3; padding:8px 0; cursor:text; min-width:0;
    word-break:break-word; }
  .voce-name.provisional{ color:var(--ink2); font-style:italic; }
  .voce .flash{ animation:flash .9s ease; }
  @keyframes flash{ 0%{ background:var(--ok-bg);} 100%{ background:transparent;} }
  .rowbtn{ flex:0 0 auto; width:56px; height:56px; border:none; background:transparent; color:var(--ink2);
    border-radius:10px; display:grid; place-items:center; cursor:pointer; }
  .rowbtn:hover{ background:var(--line2); color:var(--ink); }
  .rowbtn svg{ width:20px; height:20px; }
  .addbtn{
    width:100%; text-align:left; background:var(--surface); border:none; border-bottom:1px solid var(--line2);
    color:var(--blu); font:inherit; font-weight:600; font-size:15px; padding:14px 16px; cursor:pointer;
    display:flex; align-items:center; gap:10px; min-height:56px;
  }
  .addbtn svg{ width:20px; height:20px; }
  .addbtn:hover{ background:var(--blu-bg); }
  .newshelf{
    margin:16px; width:calc(100% - 32px); background:transparent; border:1.5px dashed #B9C2D4;
    color:var(--blu); border-radius:14px; padding:14px; font:inherit; font-weight:650; font-size:15px;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; min-height:56px;
  }
  .newshelf svg{ width:20px; height:20px; flex:0 0 auto; }
  .newshelf:hover{ background:var(--blu-bg); border-color:var(--blu); }
  .inline-edit{
    width:100%; font:inherit; font-size:16.5px; padding:9px 10px; border:2px solid var(--blu);
    border-radius:9px; outline:none; background:#fff; color:var(--ink); min-width:0; display:block;
  }

  /* ============ STOCK OVERLAY ============ */
  .stock-note{ display:flex; align-items:center; gap:8px; padding:10px 16px; background:var(--blu-bg);
    color:var(--blu-scuro); font-size:13px; font-weight:600; border-bottom:1px solid var(--line); }
  .stock-note svg{ width:16px; height:16px; }
  .stockbadge{ flex:0 0 auto; display:inline-flex; align-items:center; gap:6px; font-weight:720;
    font-size:15px; padding:6px 10px; border-radius:10px; font-variant-numeric:tabular-nums; }
  .stockbadge svg{ width:16px; height:16px; }
  .stockbadge.has{ background:var(--ok-bg); color:var(--ok); }
  .stockbadge.zero{ background:var(--mancante-bg); color:var(--mancante); }
  .stockbadge.nodata{ background:var(--line2); color:var(--ink2); }
  .miss-dot{ width:9px; height:9px; border-radius:50%; background:var(--mancante); flex:0 0 auto; }
  .section-h{ padding:16px 16px 8px; font-size:12.5px; font-weight:750; letter-spacing:.05em;
    text-transform:uppercase; color:var(--ink2); }
  .da-item{ display:flex; align-items:center; gap:10px; min-height:58px; padding:8px 16px;
    background:var(--surface); border-bottom:1px solid var(--line2); }
  .da-item .n{ flex:1; font-size:16px; }
  .assign-btn{ border:1px solid var(--blu); background:var(--blu-bg); color:var(--blu); font:inherit;
    font-weight:700; font-size:14px; border-radius:10px; padding:8px 12px; cursor:pointer; min-height:56px; }
  .empty-note{ padding:28px 20px; text-align:center; color:var(--ink2); font-size:14px; line-height:1.5; }

  /* ============ INVENTARIO ============ */
  .inv-banner{ margin:16px; padding:14px 16px; border-radius:14px; background:var(--blu-bg);
    border:1px solid #CADAF6; display:flex; align-items:center; gap:12px; }
  .inv-banner .rec-live{ width:12px; height:12px; border-radius:50%; background:var(--blu);
    flex:0 0 auto; box-shadow:0 0 0 0 rgba(27,91,215,.5); animation:pulse 1.8s infinite; }
  @keyframes pulse{ 0%{ box-shadow:0 0 0 0 rgba(27,91,215,.45);} 70%{ box-shadow:0 0 0 8px rgba(27,91,215,0);} 100%{ box-shadow:0 0 0 0 rgba(27,91,215,0);} }
  .inv-banner .txt b{ font-size:15px; } .inv-banner .txt small{ display:block; color:var(--ink2); font-size:12.5px; margin-top:2px; }
  .inv-count{ margin-left:auto; font-size:22px; font-weight:800; color:var(--blu); font-variant-numeric:tabular-nums; }

  /* ============ DETTATURA / MIC ============ */
  .dict-area{ padding:16px; }
  .dict-sim{ display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:650;
    color:var(--incerto); background:var(--incerto-bg); padding:6px 11px; border-radius:999px; margin-bottom:14px; }
  .dict-sim svg{ width:14px; height:14px; }
  .dict-pick svg{ width:18px; height:18px; flex:0 0 auto; }   /* Fix box gigante: vincola l'icona del selettore scaffale (unica SVG senza classe) */
  .mic-auth{ width:calc(100% - 32px); margin:0 16px 14px; background:var(--blu-bg); border:1.5px solid #CADAF6;
    color:var(--blu-scuro); border-radius:14px; padding:14px 16px; font:inherit; cursor:pointer; text-align:left;
    display:flex; align-items:center; gap:13px; min-height:64px; }
  .mic-auth:hover{ background:#DEE9FC; border-color:var(--blu); }
  .mic-auth .ma-emoji{ font-size:26px; line-height:1; flex:0 0 auto; }
  .mic-auth .ma-txt b{ display:block; font-size:15.5px; font-weight:720; color:var(--blu-scuro); }
  .mic-auth .ma-txt small{ display:block; font-size:13px; color:var(--ink2); margin-top:2px; line-height:1.35; }
  .dict-info{ width:calc(100% - 32px); margin:0 16px 14px; background:var(--incerto-bg); border:1px solid #E3CE93;
    color:var(--incerto); border-radius:14px; padding:13px 16px; font-size:13.5px; font-weight:600; line-height:1.4; }
  .mic-wrap{ display:flex; flex-direction:column; align-items:center; gap:12px; padding:8px 0 4px; }
  .mic-btn{ width:88px; height:88px; border-radius:50%; border:none; cursor:pointer; color:#fff;
    background:var(--blu); display:grid; place-items:center; box-shadow:0 8px 24px -8px rgba(27,91,215,.6); }
  .mic-btn svg{ width:38px; height:38px; }
  .mic-btn.rec{ background:var(--rec); box-shadow:0 0 0 0 rgba(194,31,46,.5); animation:mic 1.3s infinite; }
  @keyframes mic{ 0%{ box-shadow:0 0 0 0 rgba(194,31,46,.5);} 70%{ box-shadow:0 0 0 18px rgba(194,31,46,0);} 100%{ box-shadow:0 0 0 0 rgba(194,31,46,0);} }
  .mic-label{ font-size:14px; font-weight:650; color:var(--ink2); }
  .mic-label.on{ color:var(--rec); font-weight:720; }
  .cmd-confirm{ margin:14px 16px; padding:14px; border-radius:14px; background:var(--incerto-bg);
    border:1px solid #E3CE93; display:flex; align-items:center; gap:12px; }
  .cmd-confirm .ct{ flex:1; font-size:14px; font-weight:600; color:var(--incerto); }
  .cmd-confirm button{ border:none; background:var(--incerto); color:#fff; font:inherit; font-weight:700;
    border-radius:10px; padding:10px 14px; cursor:pointer; min-height:56px; display:inline-flex; align-items:center; gap:6px; }
  .cmd-confirm button svg{ width:18px; height:18px; }

  /* ============ ACTION BAR ============ */
  .actionbar{ flex:0 0 auto; background:var(--surface); border-top:1px solid var(--line);
    padding:10px 12px; display:flex; gap:10px; }
  .actionbar.hidden{ display:none; }
  .btn{ flex:1; min-height:56px; border-radius:14px; border:1px solid var(--line); background:var(--surface);
    color:var(--ink); font:inherit; font-weight:720; font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:9px; }
  .btn svg{ width:22px; height:22px; }
  .btn:hover{ background:var(--line2); }
  .btn:disabled{ opacity:.55; cursor:default; }
  .btn-primary{ background:var(--blu); color:#fff; border-color:var(--blu); }
  .btn-primary:hover{ background:var(--blu-scuro); }
  .btn-rec{ background:var(--rec); color:#fff; border-color:var(--rec); }
  .btn-danger-soft{ color:var(--mancante); border-color:#E7C6C2; background:var(--mancante-bg); }
  .btn-ghost{ background:transparent; }
  .actionbar.col{ flex-direction:column; }

  /* ============ OVERLAY / SHEET / MODAL / TOAST ============ */
  .ov{ position:absolute; inset:0; z-index:40; display:flex; }
  .ov-bd{ position:absolute; inset:0; background:rgba(16,20,30,.42); animation:fade .18s ease; }
  @keyframes fade{ from{ opacity:0;} to{ opacity:1;} }
  @keyframes rise{ from{ transform:translateY(24px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .sheet{ position:relative; margin-top:auto; width:100%; background:var(--surface);
    border-radius:22px 22px 0 0; padding:8px 12px calc(14px + env(safe-area-inset-bottom)); z-index:1;
    animation:rise .22s ease; max-height:82%; overflow-y:auto; }
  .sheet-grab{ width:40px; height:5px; border-radius:3px; background:var(--line); margin:8px auto 6px; }
  .sheet-title{ font-size:15px; font-weight:730; padding:8px 10px 4px; }
  .sheet-sub{ font-size:13px; color:var(--ink2); padding:0 10px 8px; line-height:1.4; }
  .sheet-item{ width:100%; text-align:left; background:transparent; border:none; font:inherit; font-size:16.5px;
    padding:15px 12px; border-radius:12px; cursor:pointer; color:var(--ink); display:flex; align-items:center; gap:12px; min-height:56px; }
  .sheet-item:hover{ background:var(--line2); }
  .sheet-item svg{ width:22px; height:22px; color:var(--ink2); }
  .sheet-item.danger{ color:var(--mancante); } .sheet-item.danger svg{ color:var(--mancante); }
  .modal{ position:relative; margin:auto; width:calc(100% - 40px); max-width:340px; background:var(--surface);
    border-radius:20px; padding:22px; z-index:1; animation:rise .2s ease; }
  .modal h3{ margin:0 0 10px; font-size:19px; font-weight:750; letter-spacing:-.01em; text-wrap:balance; }
  .modal p{ margin:0 0 18px; font-size:14.5px; color:var(--ink2); line-height:1.5; }
  .modal p b{ color:var(--ink); }
  .modal-actions{ display:flex; flex-direction:column; gap:9px; }
  .m-btn{ min-height:56px; border-radius:12px; border:1px solid var(--line); background:var(--surface);
    color:var(--ink); font:inherit; font-weight:700; font-size:15.5px; cursor:pointer; padding:0 14px; }
  .m-btn:hover{ background:var(--line2); }
  .m-btn.primary{ background:var(--blu); color:#fff; border-color:var(--blu); }
  .m-btn.danger{ background:var(--mancante); color:#fff; border-color:var(--mancante); }
  .m-btn.danger:hover{ filter:brightness(.94); }

  .toast-root{ position:absolute; left:0; right:0; bottom:78px; z-index:60; display:flex; flex-direction:column;
    align-items:center; gap:8px; pointer-events:none; padding:0 16px; }
  .toast{ background:#111318; color:#fff; font-size:14px; font-weight:600; padding:12px 16px; border-radius:12px;
    box-shadow:0 8px 24px -8px rgba(0,0,0,.5); animation:rise .2s ease; max-width:100%; text-align:center; pointer-events:auto; }
  .snackbar{ background:#111318; color:#fff; font-size:14px; font-weight:600; padding:10px 10px 10px 16px; border-radius:12px;
    display:flex; align-items:center; gap:14px; box-shadow:0 8px 24px -8px rgba(0,0,0,.5); animation:rise .2s ease; pointer-events:auto; }
  .snackbar button{ background:transparent; border:none; color:#7FB0FF; font:inherit; font-weight:750; font-size:14px;
    cursor:pointer; padding:8px 14px; border-radius:8px; min-height:48px; min-width:48px; display:inline-flex; align-items:center; justify-content:center; }   /* B3/E6 вЂ” В«AnnullaВ» a portata di dito (в‰Ґ48px) */

  /* ============ PROTO BANNER ============ */
  .proto-banner{ flex:0 0 auto; background:#111318; color:#D6DAE2; font-size:11px; font-weight:600;
    letter-spacing:.01em; text-align:center; padding:6px 12px; line-height:1.35; display:flex;
    align-items:center; justify-content:center; gap:7px; }
  .proto-banner svg{ width:13px; height:13px; flex:0 0 auto; opacity:.85; }

  :focus-visible{ outline:3px solid #0D47A1; outline-offset:2px; border-radius:8px; }
  @media (prefers-reduced-motion:reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>

<div class="stage">
  <div class="device">
    <div class="app" id="app">
      <div class="statusbar">
        <span id="clock">9:41</span>
        <span class="dots"><i></i><i></i><i></i></span>
      </div>
      <header class="topbar" id="topbar"></header>
      <main class="screen" id="screen"></main>
      <div class="actionbar hidden" id="actionbar"></div>
      <div class="proto-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>
        Prototipo dimostrativo вЂ” dati di esempio
      </div>
      <div class="toast-root" id="toastRoot" role="status" aria-live="polite" aria-atomic="true"></div>  <!-- G-E3 -->
    </div>
  </div>
</div>

<script>
"use strict";
(function(){
  /* v1.6.28-fix вЂ” gemelli core identici post-mandato docs/16 (22 + N-1 tessera) 2026-07-09 */

  /* ---- Confronto nomi per l'aggancio listinoв†”magazzino (scelte del committente) ----
     Tolleranze che NON generano falsi positivi:
     1) ordine delle parole indifferente: В«Coca Cola 1LВ» = В«1L Coca ColaВ» (firma con parole ordinate);
     2) parole-riempitivo ignorabili: В«san benedetto matcha the verdeВ» = В«san benedetto matcha verdeВ»
        (forti = articoli/preposizioni non ambigue; deboli the/te/gusto/succo solo come OMISSIONE, mai sostituzione);
     3) refuso di UNA lettera per parola = SOLO la SOSTITUZIONE di una lettera a PARITГЂ DI LUNGHEZZA (stessa
        lunghezza, una posizione diversa, distanza di Hamming = 1): В«sottiletteВ»=В«sottilettaВ», В«mela rossaВ»=В«mela
        russaВ», anche su nomi di UNA sola parola. Un cambio di LUNGHEZZA (una lettera in piГ№ o in meno) NON ГЁ
        refuso ma prodotto diverso: В«mela rossaВ»в‰ В«mela rosaВ» (rossa 5/rosa 4), В«colaВ»в‰ В«collaВ», В«mozzarellaВ»в‰ В«mozarellaВ».
     Restano NON agganciati: В«pescaВ»в‰ В«peraВ» e ogni cambio di lunghezza, 1Lв‰ 2L, в‰Ґ2 lettere diverse. PrioritГ : evitare i FALSI POSITIVI. */
  // firma: minuscolo/senza accenti (norm), decimali marcati (1,5 = 1.5, ma в‰  15!), punteggiaturaв†’spazio
  // (Coca-Cola = Coca Cola, S.Pellegrino = S Pellegrino), parole ORDINATE (ordine indifferente).
  // P3 вЂ” il separatore decimale diventa В«decВ» (1,5 в†’ 1dec5) cosГ¬ В«1,5 LВ» NON coincide piГ№ con В«15 LВ».
  // P3 вЂ” В«theВ» (grafia ASR di В«tГЁВ») ГЁ unificato a В«teВ»: cosГ¬ В«matcha the verdeВ» = В«matcha tГЁ verdeВ» (stessa parola),
  // mentre resta distinto da В«succoВ» (v. riempitivi deboli: the/succo ГЁ sostituzione, non omissione).
  function sig(nome){ return norm(nome).replace(/(\d)[.,](\d)/g,'$1dec$2').replace(/[^a-z0-9\s]+/g,' ').replace(/\bthe\b/g,'te').split(' ').filter(Boolean).sort().join(' '); }
  const WORD_MIN=0.70;   // soglia interna: un refuso (0.9) la supera, una parola diversa (0) no
  // Somiglianza fra due PAROLE: 1 = identiche; 0.9 = refuso di UNA sola lettera SOSTITUITA a PARITГЂ di lunghezza
  // (distanza di Hamming = 1); 0 = diverse. Il refuso ГЁ ammesso SOLO su parole di almeno 3 lettere, senza cifre e
  // di UGUALE lunghezza: cosГ¬ В«sottiletteВ»/В«sottilettaВ» e В«moguВ»/В«mogoВ» passano, mentre В«colaВ»/В«collaВ» NO (lunghezze
  // 4 e 5: una lettera in piГ№ = prodotto diverso), come В«vitamina EВ»/В«vitamina DВ» (1-2 lettere) e i formati (1Lв‰ 2L).
  function wordSim(a,b){
    if(a===b) return 1;
    if(/\d/.test(a) || /\d/.test(b)) return 0;      // numeri/formati: solo identici (1Lв‰ 2L, 500gв‰ 600g)
    if(a.length<3 || b.length<3) return 0;          // parole di 1-2 lettere: solo identiche (vitamina E в‰  D)
    if(a.length!==b.length) return 0;               // lunghezza diversa = prodotto diverso (colaв‰ colla, mozzarellaв‰ mozarella)
    let diff=0;                                     // conta le posizioni con lettera diversa (distanza di Hamming)
    for(let i=0;i<a.length;i++){ if(a.charCodeAt(i)!==b.charCodeAt(i) && ++diff>1) return 0; }
    return diff===1 ? 0.9 : 0;                       // esattamente UNA lettera sostituita (sottiletta/sottilette)
  }
  // Punteggio fra due elenchi di parole: -1 se NON ГЁ lo stesso prodotto, altrimenti (0..1].
  // Richiede lo STESSO numero di parole e che ogni parola si abbini a UNA parola dell'altro nome вЂ” identica
  // oppure refuso di 1 lettera a paritГ  di lunghezza (v. wordSim). Il refuso ГЁ ammesso anche quando una parola
  // resta identica e un'altra cambia: В«mela rossaВ»=В«mela russaВ» (rossa/russa stessa lunghezza), В«mogu moguВ»=В«mogo mogoВ».
  // Restano distinti i cambi di lunghezza: В«mela rossaВ»в‰ В«mela rosaВ» (rossa 5/rosa 4), В«pepsi lattinaВ»в‰ В«peppsi lattinaВ».
  function tokenScore(A,B){
    if(!A.length || A.length!==B.length) return -1;
    const used=new Array(B.length).fill(false); let tot=0;
    for(const wa of A){
      let bj=-1, bs=-1;
      for(let j=0;j<B.length;j++){ if(used[j]) continue; const s=wordSim(wa,B[j]); if(s>bs){ bs=s; bj=j; } }
      if(bj<0 || bs<WORD_MIN) return -1;
      used[bj]=true; tot+=bs;
    }
    return tot/A.length;
  }
  // P3 вЂ” parole-riempitivo che NON distinguono un prodotto, in DUE livelli di prudenza:
  //  вЂў FORTI (STOP): articoli/preposizioni/congiunzioni puramente grammaticali вЂ” sempre ignorabili.
  //  вЂў DEBOLI (STOP_WEAK): В«te/theВ» (l'ASR scrive В«tГЁВ» come В«theВ»). Ignorabili SOLO se restano в‰Ґ2 parole
  //    significative per lato: cosГ¬ В«matcha the verdeВ» = В«matcha verdeВ», ma В«te pescaВ» в‰  В«pescaВ» (tГЁ freddo
  //    vs frutto fresco), В«te limoneВ» в‰  В«limoneВ», ecc. вЂ” la parola-testa non si puГІ cancellare.
  // Ogni parola descrittiva (intero, verde, naturale, bioвЂ¦), ogni gusto e ogni numero/formato restano SIGNIFICATIVI.
  // Solo particelle grammaticali NON ambigue. Escluse di proposito В«e, d, i, inВ»: possono essere
  // significative (В«vitamina EВ» в‰  В«vitamina DВ», В«riso in biancoВ» в‰  В«riso biancoВ», В«serie EВ», В«categoria IВ»).
  const STOP = new Set(['di','del','dello','della','dei','degli','delle','da','con','ed',
    'al','allo','alla','ai','agli','alle','il','lo','la','gli','le',
    'un','uno','una','l']);
  // DEBOLI: parole-testa/categoria e modificatori generici, tolti solo se restano в‰Ґ2 parole significative
  // (В«santal succo pescaВ» = В«santal pescaВ», ma В«succo pescaВ» в‰  В«pescaВ»; В«yogurt gusto pescaВ» = В«yogurt pescaВ»).
  const STOP_WEAK = new Set(['the','te','gusto','succo']);
  const FILLER_PEN = 0.97;   // lieve penalitГ : a paritГ , l'aggancio esatto/stesso-conteggio vince su quello coi riempitivi
  const noStop = (arr)=> arr.filter(t=>!STOP.has(t));
  // Punteggio d'aggancio fra due elenchi di parole (giГ  normalizzate/ordinate come da sig()): -1 = prodotti
  // diversi; altrimenti (0..1]. PrioritГ  assoluta: evitare i FALSI POSITIVI.
  function matchScore(A, B){
    // Livello 1+2: stesso numero di parole, ordine indifferente. Il refuso di 1 lettera a paritГ  di lunghezza ГЁ
    // gestito da wordSim/tokenScore, anche sui nomi di UNA sola parola: В«sottiletteВ»=В«sottilettaВ», В«granoВ»=В«granaВ».
    const s=tokenScore(A, B);
    if(s>=0) return s;
    // Livello 3 (riempitivi FORTI rimossi): scatta solo se almeno un riempitivo ГЁ stato tolto.
    const Ac=noStop(A), Bc=noStop(B);
    if(Ac.length && Bc.length && !(Ac.length===A.length && Bc.length===B.length)){
      const sc=tokenScore(Ac, Bc);
      if(sc>=0){
        // una parola residua per lato: identitГ  o refuso di 1 lettera a paritГ  di lunghezza (sottiletta/sottilette)
        if(Ac.length===1 || Bc.length===1){ const w=wordSim(Ac[0],Bc[0]); if(w>=WORD_MIN) return w*FILLER_PEN; }
        else return sc*FILLER_PEN;
      }
    }
    // Livello 3-bis (riempitivi DEBOLI the/te/gusto/succo): ammessi SOLO come OMISSIONE вЂ” un lato li ha,
    // l'altro NO вЂ” e con в‰Ґ2 parole significative per lato. MAI come SOSTITUZIONE: В«the pescaВ» в‰  В«succo pescaВ»
    // (tГЁ freddo vs succo: prodotti/reparti diversi), В«gusto peraВ» в‰  В«succo peraВ». Se entrambi i lati hanno
    // un debole diverso, i due nomi restano distinti.
    const Aw=Ac.filter(t=>!STOP_WEAK.has(t)), Bw=Bc.filter(t=>!STOP_WEAK.has(t));
    const aTolto=Aw.length<Ac.length, bTolto=Bw.length<Bc.length;
    if(Aw.length>=2 && Bw.length>=2 && (aTolto!==bTolto)){   // esattamente UN lato aveva un debole (omissione)
      const sc=tokenScore(Aw, Bw);
      if(sc>=0) return sc*FILLER_PEN;
    }
    return -1;
  }
  // Chiave della mappa (firme) col punteggio migliore; null se nessuna ГЁ lo stesso prodotto.
  function bestMatchKey(nome, map){
    const vs=sig(nome); if(map[vs]) return vs;      // esatto/riordinato (regola 1)
    const A=vs?vs.split(' '):[]; let bk=null, bsc=-1;
    for(const k in map){ const sc=matchScore(A, k.split(' ')); if(sc>bsc){ bsc=sc; bk=k; } }
    return (bk && bsc>=0) ? bk : null;
  }

  /* ============ INVENTARIO PER AMBITO (Requisito 13) ============ */
  // L'inventario di magazzino ha una SELEZIONE D'AMBITO: una corsia di sala (sovrascrive solo
  // quella, cancellazione differita alla conclusione) oppure В«tutte le corsieВ» (azzera tutto e
  // si rifГ  da capo). Ogni riga committata porta il proprio ambito: l'id della corsia a cui
  // appartiene, o '__gen__' se il suo nome non compare in alcun listino di sala.
  const AMB_GEN = '__gen__';
  function ambitoDaNome(u, nome){
    const A=sig(nome).split(' ').filter(Boolean); if(!A.length) return AMB_GEN;
    // assegna alla corsia il cui listino contiene la voce piГ№ simile (stesse regole dell'aggancio)
    let bestC=AMB_GEN, bestSc=-1;
    (u.corsie||[]).forEach(c=> (c.scaffali||[]).forEach(sc=> (sc.voci||[]).forEach(v=>{
      const score=matchScore(A, sig((parseRiga(v.nome).nome)||v.nome).split(' ').filter(Boolean));   // A9 вЂ” confronta il nome di sala SENZA formato, come abbinaCorsia (simmetria attribuzioneв†”aggancio)
      if(score>bestSc){ bestSc=score; bestC=c.id; }
    })));
    return bestSc>=0 ? bestC : AMB_GEN;
  }
  // Migrazione idempotente: porta i dati salvati/demo pre-Requisito 13 al modello ad-ambito,
  // senza perdere nulla. Le righe giГ  presenti in inv.righe diventano l'inventario committato.
  function normalizzaInv(u){
    if(!u || !u.inv) return; const inv=u.inv;
    if(!Array.isArray(inv.staging)) inv.staging=[];
    if(inv.ambito===undefined) inv.ambito=null;
    if(inv.ambitoNome===undefined) inv.ambitoNome='';
    (inv.righe||[]).forEach(r=>{ if(r.ambito===undefined) r.ambito=ambitoDaNome(u, r.nome); });
    // Vecchio modello con inventario in corso (В«active:trueВ», righe in lavorazione, senza ambito):
    // lo si RIAPRE come sessione TOTALE attiva, cosГ¬ l'operatore ritrova la lista con В«ConcludiВ».
    // Le righe restano committate (lo Stock le mostra) e sono copiate in staging per la modifica.
    if(inv.active && inv.ambito===null && inv.staging.length===0){
      if((inv.righe||[]).length){ inv.ambito='ALL'; inv.ambitoNome='Tutte le corsie'; inv.staging=staginaDaRighe(inv); }
      else inv.active=false;
    }
  }
  // Resiliente: un singolo utente malformato non deve mai bloccare l'avvio (gira fuori dal try di caricaDati).
  function normalizzaTutto(){ Object.keys(DB).forEach(k=>{ try{ normalizzaInv(DB[k]); }catch(e){} }); }
  function oraOra(){ const n=new Date(); return n.getHours()+':'+String(n.getMinutes()).padStart(2,'0'); }
  // Copia (con id nuovi) delle righe committate, da usare come lista di lavoro modificabile (staging).
  function staginaDaRighe(inv){ return (inv.righe||[]).map(r=>({ id:nid(), nome:r.nome,
    quantita:(r.quantita||[]).map(q=>({n:q.n, unita:q.unita})), raw:r.raw, ambito:r.ambito })); }

  /* ============ LESSICO UNITГЂ (parser quantitГ ) ============ */
  // canonico singolare -> plurale
  const UNITA_PL = {
    pezzo:'pezzi', cartone:'cartoni', scatola:'scatole', scatolone:'scatoloni',
    cassa:'casse', cassetta:'cassette', confezione:'confezioni', vaschetta:'vaschette',
    bottiglia:'bottiglie', lattina:'lattine', fardello:'fardelli', collo:'colli',
    pacco:'pacchi', busta:'buste', sacco:'sacchi', sacchetto:'sacchetti',
    barattolo:'barattoli', vasetto:'vasetti', flacone:'flaconi', tanica:'taniche',
    bancale:'bancali', pallet:'pallet', pedana:'pedane', scaffale:'scaffali',
    ripiano:'ripiani', strato:'strati', fila:'file', espositore:'espositori',
    cestello:'cestelli', blister:'blister', stecca:'stecche',
    grammo:'grammi', chilo:'chili', litro:'litri'
  };
  // qualsiasi forma di superficie (singolare o plurale) -> canonico singolare
  const UNIT_FORM = {};
  Object.keys(UNITA_PL).forEach(s=>{ UNIT_FORM[s]=s; UNIT_FORM[UNITA_PL[s]]=s; });
  UNIT_FORM['kg']='chilo';
  // unitГ  di FORMATO (peso/volume): fanno parte del NOME del prodotto, NON sono quantitГ  da contare (decisione committente:
  // В«il formato non deve diventare quantitГ В»). CosГ¬ В«Acqua naturale 1,5 litriВ» resta un nome intero, e 1L в‰  2L nell'aggancio.
  const UNIT_FORMATO = new Set(['grammo','chilo','litro']);
  // unitГ  di genere femminile (per concordanza di В«mezzo/mezzaВ»)
  const FEM = new Set(['scatola','cassa','cassetta','confezione','vaschetta','bottiglia',
    'lattina','busta','tanica','pedana','fila','stecca']);
  const plural = (u)=> UNITA_PL[u] || u;

  /* ---- numeri in parole italiane ---- */
  const NUMWORDS = {
    zero:0, un:1, uno:1, una:1, due:2, tre:3, quattro:4, cinque:5, sei:6, sette:7,
    otto:8, nove:9, dieci:10, undici:11, dodici:12, tredici:13, quattordici:14,
    quindici:15, sedici:16, diciassette:17, diciotto:18, diciannove:19,
    venti:20, trenta:30, quaranta:40, cinquanta:50, sessanta:60, settanta:70,
    ottanta:80, novanta:90, cento:100
  };
  (function(){
    const unitsW = ['','uno','due','tre','quattro','cinque','sei','sette','otto','nove'];
    const tensW  = {20:'venti',30:'trenta',40:'quaranta',50:'cinquanta',60:'sessanta',70:'settanta',80:'ottanta',90:'novanta'};
    Object.keys(tensW).forEach(tv=>{
      const tw=tensW[tv];
      for(let u=1;u<=9;u++){
        // elisione della vocale finale davanti a В«unoВ» e В«ottoВ» (ventuno, ventottoвЂ¦)
        const word = (u===1||u===8) ? tw.slice(0,-1)+unitsW[u] : tw+unitsW[u];
        NUMWORDS[word] = Number(tv)+u;
      }
    });
  })();

  /* ---- parser: testo -> {nome, quantita:[{n,unita}], raw} ---- */
  function parseRiga(testo){
    const rawStr = String(testo==null?'':testo).trim();
    if(!rawStr) return { nome:'', quantita:[], raw:'' };
    // R1 вЂ” il motore vocale puГІ aggiungere punteggiatura di chiusura: la si toglie prima di tokenizzare
    const cleaned = rawStr.replace(/[.?!вЂ¦]+$/,'').trim();
    // protegge la virgola decimale (3,5); virgole/В«В·В»/В«;В» diventano connettore В«eВ»
    let s = cleaned.replace(/(\d),(\d)/g,'$1@D@$2').replace(/[В·,;]/g,' e ').replace(/@D@/g,',');
    const toks = s.split(/\s+/).filter(Boolean);
    // R1 вЂ” per il confronto ogni token viene spogliato della punteggiatura di contorno
    // (conservando la virgola decimale interna, es. В«3,5В»); il nome resta dai token ORIGINALI
    const N = toks.map(t=>norm(t).replace(/^[^\p{L}\p{N}]+|[^\p{L}\p{N},]+$/gu,''));
    const numVal = (t)=>{
      if(/^\d+(?:,\d+)?$/.test(t)) return parseFloat(t.replace(',','.'));
      if(NUMWORDS[t]!=null) return NUMWORDS[t];
      return null;
    };
    const isConn = (t)=> t==='e'||t==='ed'||t==='piu'||t==='piГ№'||t==='';

    // --- pattern В«in testaВ»: QUANTITГЂ UNITГЂ di NOME ---
    let lead=null;
    (function(){
      let k=0, n=null;
      if(N[k]==='mezzo'||N[k]==='mezza'){ n=0.5; k++; }
      else if((N[k]==='un'||N[k]==='uno'||N[k]==='una') && N[k+1]==='quarto'){
        let kk = k+2; if(N[kk]==='di') kk++;
        const canonChk = UNIT_FORM[N[kk]];
        if(canonChk && !UNIT_FORMATO.has(canonChk)){ n=0.25; k=kk; }
      }
      else { const v=numVal(N[k]); if(v!=null){ n=v; k++; } }
      if(n==null) return;
      const canon = UNIT_FORM[N[k]]; if(!canon) return; if(UNIT_FORMATO.has(canon)) return; k++;   // il formato (litri/grammi/chili) non ГЁ quantitГ : resta nel nome
      if(N[k]==='e' && (N[k+1]==='mezzo'||N[k+1]==='mezza')){ n+=0.5; k+=2; }
      if(N[k]!=='di') return; k++;
      const nome = toks.slice(k).join(' ').trim();
      if(!nome) return;
      lead = { nome, quantita:[{n, unita:canon}], raw:rawStr };
    })();
    if(lead) return lead;

    // --- scansione da destra: stacca le coppie (numero, unitГ ) ---
    const quantita=[];
    let i=N.length-1, consumedAny=false, pendingHalf=0;
    while(i>=0){
      const t=N[i];
      if(isConn(t)){ i--; continue; }
      const canon=UNIT_FORM[t];
      if(canon){
        if(UNIT_FORMATO.has(canon)){ if(pendingHalf>0 && !quantita.length){ pendingHalf=0; i=N.length-1; } break; }   // formato (litri/grammi/chili/kg): resta nel nome вЂ” con l'eventuale В«e mezzoВ» (niente quantitГ  fantasma В«mezzo pezzoВ»)
        let j=i-1, n=null;
        if(j>=0){
          const lt=N[j];
          if(lt==='mezzo'||lt==='mezza'){ n=0.5; j--; }
          else if(lt==='di' && j-1>=0 && N[j-1]==='quarto'){ n=0.25; j-=2; if(j>=0&&(N[j]==='un'||N[j]==='uno'||N[j]==='una')) j--; }
          else if(lt==='quarto'){ n=0.25; j--; if(j>=0&&(N[j]==='un'||N[j]==='uno'||N[j]==='una')) j--; }
          else { const v=numVal(lt); if(v!=null){ n=v; j--; } }
        }
        if(n==null) n=1;
        n+=pendingHalf; pendingHalf=0;
        quantita.unshift({n, unita:canon});
        consumedAny=true; i=j; continue;
      }
      if(t==='mezzo'||t==='mezza'){ pendingHalf+=0.5; consumedAny=true; i--; continue; }
      const v=numVal(t);
      if(v!=null && v!==0 && !consumedAny){ quantita.unshift({n:v, unita:'pezzo'}); consumedAny=true; i--; break; }   // A2 вЂ” un В«zeroВ»/В«0В» finale isolato (senza unitГ ) ГЁ parte del nome (Coca Cola Zero), non una quantitГ 
      break;
    }
    if(pendingHalf>0){
      if(quantita.length) quantita[0].n+=pendingHalf;
      else quantita.unshift({n:pendingHalf, unita:'pezzo'});
    }
    let nome = toks.slice(0, i+1).join(' ').replace(/\s+(e|ed|di|piГ№|piu)\s*$/i,'').trim();
    if(!nome && !quantita.length){ nome=rawStr; }
    if(quantita.length === 0 && /\bquarto\b/i.test(rawStr)) { nome = rawStr; }  // A-R2: "un quarto" senza unitГ  resta nel nome, niente 0.25 pezzo
    return { nome, quantita, raw:rawStr };
  }

  /* ---- formattazione quantitГ  per il display ---- */
  function numIt(n){ return Number.isInteger(n) ? String(n) : String(n).replace('.',','); }
  function fmtOne(p){
    const u=p.unita, fem=FEM.has(u), n=p.n;
    if(n===0.5) return (fem?'mezza ':'mezzo ')+u;
    if(n===0.25) return 'un quarto di '+u;
    const whole=Math.floor(n), frac=+(n-whole).toFixed(2);
    if(frac===0.5 && whole>=1){
      const noun = whole===1 ? u : plural(u);
      return numIt(whole)+' '+noun+' e '+(fem?'mezza':'mezzo');
    }
    const noun = (n===1) ? u : plural(u);
    return numIt(n)+' '+noun;
  }
  function fmtQuantita(q){ if(!q||!q.length) return ''; return q.map(fmtOne).join(' + '); }
  function qIsZero(q){ return !!(q && q.length>0 && q.every(p=>p.n===0)); }

  /* ============ RICONOSCIMENTO VOCALE (Web Speech API, reale) ============ */
  // Nessuna simulazione: il riconoscimento ГЁ reale quando il browser lo supporta e il microfono ГЁ autorizzato.
  // Stati possibili: reale attivo/pronto В· microfono non autorizzato В· riconoscimento non disponibile sul browser.
  // Durata del silenzio (ms) oltre la quale la frase in corso si considera conclusa e viene emessa.
  const PAUSA_FRASE_MS = 1100;
  const Speech = {
    rec:null, supported:false, active:false, restart:false,
    permesso:'sconosciuto',          // 'granted' | 'denied' | 'prompt' | 'sconosciuto'
    onInterim:null, onFinal:null, onFail:null,
    onPermChange:null,               // callback per aggiornare la UI quando cambia lo stato del permesso
    _deniedNotified:false,           // evita di ripetere in loop il modal В«microfono bloccatoВ»
    // Buffer di frase con debounce: aggrega i risultati definitivi incrementali che Chrome Android
    // emette in modo ripetuto (ogni definitivo ricontiene l'inizio della frase) in UNA sola frase,
    // emessa via onFinal solo dopo una pausa di silenzio (PAUSA_FRASE_MS).
    bufferFrase:'', timerFrase:null,
    // BUG1/1c вЂ” anti-doppione tra flush successivi: memoria dell'ultima frase emessa (norm) e istante
    ultimaEmessa:'', ultimaEmessaTs:0,
    init(){
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!SR){ this.supported=false; }
      else {
        try{
          const r=new SR();
          r.lang='it-IT'; r.continuous=true; r.interimResults=true;
          this.rec=r; this.supported=true;
        }catch(e){ this.supported=false; this.rec=null; }
      }
      this._leggiPermesso();
    },
    // Legge lo stato del permesso microfono, se il browser espone l'API Permissions (in guardia: non ovunque).
    _leggiPermesso(){
      const self=this;
      try{
        if(navigator.permissions && navigator.permissions.query){
          navigator.permissions.query({name:'microphone'}).then(st=>{
            self.permesso = st.state;
            if(st.state==='granted') self._deniedNotified=false;
            try{ st.onchange=()=>{ self.permesso=st.state; if(st.state==='granted') self._deniedNotified=false;
              if(typeof self.onPermChange==='function') self.onPermChange(); }; }catch(e){}
            if(typeof self.onPermChange==='function') self.onPermChange();
          }).catch(()=>{ self.permesso='sconosciuto'; });
        }
      }catch(e){ this.permesso='sconosciuto'; }
    },
    // Fa comparire la richiesta di autorizzazione del browser (getUserMedia). Ferma subito le tracce.
    richiediPermesso(onOk, onKo){
      const self=this;
      try{
        if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
          // Contesto non sicuro (es. file://): impossibile richiedere. Si procede lasciando avviare Speech.start().
          self.permesso='sconosciuto'; if(onOk) onOk(); return;
        }
        navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
          try{ stream.getTracks().forEach(t=>t.stop()); }catch(e){}
          self.permesso='granted'; self._deniedNotified=false;
          if(typeof self.onPermChange==='function') self.onPermChange();
          if(onOk) onOk();
        }).catch(err=>{
          self.permesso='denied';
          if(onKo) onKo();
        });
      }catch(e){ self.permesso='denied'; if(onKo) onKo(); }
    },
    // Normalizza una parola per il confronto: minuscolo, senza accenti E senza punteggiatura di contorno
    // (cosГ¬ В«limoneВ» e В«Limone.В» risultano la stessa parola).
    _np(t){ return norm(t).replace(/^[^\p{L}\p{N}]+|[^\p{L}\p{N}]+$/gu,''); },
    _parole(s){ return String(s).split(/\s+/).filter(Boolean); },
    // Vero se la sequenza di parole di a ГЁ prefisso di quella di b (confronto insensibile a maiuscole/punteggiatura).
    _prefisso(a,b){
      const wa=this._parole(a), wb=this._parole(b);
      if(wa.length>wb.length) return false;
      for(let i=0;i<wa.length;i++){ if(this._np(wa[i])!==this._np(wb[i])) return false; }
      return true;
    },
    // Fonde due frammenti riconoscendo l'eventuale sovrapposizione di parole
    // (buffer В«san benedettoВ» + nuovo В«benedetto limoneВ» -> В«san benedetto limoneВ», non В«... benedetto benedetto ...В»).
    _fondi(a,b){
      const wa=this._parole(a), wb=this._parole(b);
      const na=wa.map(w=>this._np(w)), nb=wb.map(w=>this._np(w));
      // sub(small,big): vero se la sequenza di parole `small` compare come sottosequenza contigua in `big`
      const sub=(small,big)=>{
        if(small.length>big.length) return false;
        for(let off=0; off+small.length<=big.length; off++){
          let ok=true;
          for(let i=0;i<small.length;i++){ if(small[i]!==big[i+off]){ ok=false; break; } }
          if(ok) return true;
        }
        return false;
      };
      if(sub(na,nb)) return b;   // il buffer ГЁ giГ  contenuto nel nuovo -> tieni il nuovo
      if(sub(nb,na)) return a;   // il nuovo ГЁ giГ  contenuto nel buffer -> tieni il buffer
      let k=0;                   // altrimenti: massima sovrapposizione suffisso(a)=prefisso(b)
      for(let n=Math.min(wa.length,wb.length); n>0; n--){
        let ug=true;
        for(let i=0;i<n;i++){ if(na[na.length-n+i]!==nb[i]){ ug=false; break; } }
        if(ug){ k=n; break; }
      }
      return wa.concat(wb.slice(k)).join(' ');
    },
    // Comprime le ripetizioni prodotte a volte dal motore: parole identiche consecutive
    // (В«latte latte interoВ» -> В«latte interoВ») e intere frasi ripetute in coda
    // (В«san benedetto limone san benedetto limoneВ» -> В«san benedetto limoneВ»).
    _comprimiDoppioni(s){
      let out=[];
      for(const t of this._parole(s)){
        if(out.length && this._np(out[out.length-1])===this._np(t)) continue;
        out.push(t);
      }
      // frase ripetuta in coda: se le ultime n parole ricalcano le n precedenti, si eliminano (ripetendo finchГ© serve)
      let riduci=true;
      while(riduci && out.length>=2){
        riduci=false;
        for(let n=Math.floor(out.length/2); n>=1; n--){
          let uguali=true;
          for(let i=0;i<n;i++){ if(this._np(out[out.length-n+i])!==this._np(out[out.length-2*n+i])){ uguali=false; break; } }
          if(uguali){ out=out.slice(0,out.length-n); riduci=true; break; }
        }
      }
      return out.join(' ');
    },
    // (Ri)arma il timer di pausa: allo scadere, la frase bufferizzata viene emessa una sola volta.
    _armaTimer(){
      const self=this;
      if(this.timerFrase){ clearTimeout(this.timerFrase); }
      this.timerFrase=setTimeout(()=>{ self.timerFrase=null; self.flushFrase(); }, PAUSA_FRASE_MS);
    },
    // Emette la frase accumulata (se presente) tramite onFinal, UNA volta, e svuota il buffer.
    // Timer dedicato: NON usa l'array TIMERS globale della UI (che i render azzerano).
    flushFrase(){
      if(this.timerFrase){ clearTimeout(this.timerFrase); this.timerFrase=null; }
      const b=this._comprimiDoppioni(this.bufferFrase); this.bufferFrase='';
      if(b && b.trim() && this.onFinal){
        const nb=norm(b);
        // BUG1/1c вЂ” scarta la ripetizione che Android rimanda subito dopo il riavvio di sessione:
        // stessa frase (norm) giГ  emessa da meno di 1500 ms -> non riemetterla.
        if(nb===this.ultimaEmessa && (Date.now()-this.ultimaEmessaTs) < 1500) return;
        this.ultimaEmessa=nb; this.ultimaEmessaTs=Date.now();
        this.onFinal(b);
      }
    },
    start(onInterim, onFinal, onFail){
      if(!this.rec){ if(onFail) onFail(); return false; }
      this.onInterim=onInterim; this.onFinal=onFinal; this.onFail=onFail;
      this.bufferFrase=''; if(this.timerFrase){ clearTimeout(this.timerFrase); this.timerFrase=null; }
      this.ultimaEmessa=''; this.ultimaEmessaTs=0;   // BUG1/1c вЂ” nuova sessione: azzera la memoria anti-doppione
      const r=this.rec, self=this;
      r.onresult=(ev)=>{
        let interim='';
        for(let k=ev.resultIndex; k<ev.results.length; k++){
          const res=ev.results[k];
          if(res.isFinal){
            const txt=(res[0].transcript||'').trim();
            if(txt){
              if(!self.bufferFrase){ self.bufferFrase=txt; }                       // primo frammento della frase
              else if(self._prefisso(self.bufferFrase, txt)){ self.bufferFrase=txt; } // il nuovo ricontiene il vecchio -> sostituzione
              else if(self._prefisso(txt, self.bufferFrase)){ /* doppione piГ№ corto/uguale: ignora */ }
              else { self.bufferFrase = self._fondi(self.bufferFrase, txt); }      // fusione con sovrapposizione riconosciuta
              self._armaTimer();
              if(self.onInterim) self.onInterim(self.bufferFrase);         // l'operatore vede la frase che cresce
            }
          }
          else interim+=res[0].transcript;
        }
        const it=interim.trim();
        if(it && self.onInterim) self.onInterim(self.bufferFrase ? self.bufferFrase+' '+it : it);
      };
      r.onerror=(ev)=>{
        const e=ev.error;
        if(e==='not-allowed'||e==='service-not-allowed'){
          // Permesso negato/revocato: emette prima la frase eventualmente in buffer (mai perderla),
          // poi aggiorna stato, ferma l'ascolto, azzera i flag, mostra le istruzioni una sola volta.
          self.flushFrase();
          self.permesso='denied'; self.active=false; self.restart=false;
          S.recording=false; S.magRecording=false;
          self.onFail=null;
          const first=!self._deniedNotified; self._deniedNotified=true;
          render();
          if(first) micBloccatoModal();
          return;
        }
        if(e==='audio-capture'){
          self.flushFrase();   // non perdere la frase in buffer prima di chiudere per errore fatale
          toast('Nessun microfono disponibile');
          self.active=false; self.restart=false; S.recording=false; S.magRecording=false; self.onFail=null; render();
          return;
        }
        if(e==='no-speech'||e==='aborted') return;   // A4/A11 вЂ” errori benigni in ascolto continuo (onend riavvia da sГ©): niente falso allarme a ogni pausa o stop
        toast('Riconoscimento vocale non disponibile');
      };
      r.onend=()=>{
        // Android chiude da solo la sessione: se l'utente non ha fermato, riavvia per mantenere l'ascolto continuo.
        // Se invece NON si riavvia (sessione conclusa), emette la frase eventualmente ancora in buffer.
        if(self.active && self.restart){ try{ r.start(); }catch(e){} }
        else self.flushFrase();
      };
      this.active=true; this.restart=true;
      try{ r.start(); return true; }
      catch(e){ this.active=false; this.restart=false; if(onFail) onFail(); return false; }
    },
    stop(){
      this.flushFrase();   // emette la frase eventualmente in buffer prima di fermare l'ascolto
      this.active=false; this.restart=false;
      if(this.rec){ try{ this.rec.stop(); }catch(e){} }
    }
  };
  Speech.init();

  /* ============ ELEMENTI ============ */
  const topbar=document.getElementById('topbar');
  const screen=document.getElementById('screen');
  const actionbar=document.getElementById('actionbar');
  const app=document.getElementById('app');
  const toastRoot=document.getElementById('toastRoot');

  /* ============ TOAST / SNACKBAR ============ */
  function toast(msg, ms){
    // G-D4 вЂ” calcola offset reale dalla actionbar invece di 78px fisso
    const ab=document.getElementById('actionbar'); const h=(ab&&ab.offsetHeight?ab.offsetHeight:78)+8;
    toastRoot.style.bottom = h+'px';
    const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
    toastRoot.appendChild(t); setTimeout(()=>{ t.remove(); }, (ms||4000));

  function snackbar(msg, undoLabel, onUndo){
    const s=document.createElement('div'); s.className='snackbar';

  /* ============ OVERLAY GENERICO ============ */
  function overlay(innerNode, opts){
    opts=opts||{};
    const ov=document.createElement('div'); ov.className='ov';
    const bd=document.createElement('div'); bd.className='ov-bd';
    if(opts.dismiss!==false) bd.onclick=()=>ov.remove();
    ov.appendChild(bd); ov.appendChild(innerNode);
    app.appendChild(ov);
    return ov;
  }
  function bottomSheet(title, sub, items){
    const sheet=document.createElement('div'); sheet.className='sheet';
    let h='<div class="sheet-grab"></div>';
    if(title) h+='<div class="sheet-title">'+esc(title)+'</div>';
    if(sub) h+='<div class="sheet-sub">'+esc(sub)+'</div>';
    sheet.innerHTML=h;
    const ov=overlay(sheet);
    items.forEach(it=>{
      const b=document.createElement('button');
      b.className='sheet-item'+(it.danger?' danger':'');
      b.innerHTML=(it.icon?it.icon:'')+'<span>'+esc(it.label)+'</span>';
      b.onclick=()=>{ ov.remove(); it.onClick&&it.onClick(); };
      sheet.appendChild(b);
    });
    return ov;
  }
  function modal(html, actions, dismiss){
    const m=document.createElement('div'); m.className='modal'; m.innerHTML=html;
    const wrap=document.createElement('div'); wrap.className='modal-actions';
    const ov=overlay(m,{dismiss:dismiss!==false});
    actions.forEach(a=>{
      const b=document.createElement('button'); b.className='m-btn'+(a.cls?' '+a.cls:'');
      b.textContent=a.label; b.onclick=()=>{ ov.remove(); a.onClick&&a.onClick(); };
      wrap.appendChild(b);
    });
    m.appendChild(wrap); return ov;
  }

  /* ============ EDIT INLINE ============ */
  function inlineEdit(spanEl, onCommit){
    const cur=spanEl.textContent;
    const inp=document.createElement('input'); inp.className='inline-edit'; inp.value=cur;
    spanEl.replaceWith(inp); inp.focus(); inp.select();
    let fin=false;
    const done=(save)=>{ if(fin)return; fin=true; const v=inp.value.trim(); onCommit(save&&v?v:cur); };
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();done(true);} else if(e.key==='Escape'){done(false);} });
    inp.addEventListener('blur',()=>done(true));
  }

  /* ============ RENDER PRINCIPALE ============ */
  let keepSpeech=false;   // se true, un re-render non ferma il riconoscimento in corso

  // R3 вЂ” porta in vista la riga interessata dalla dettatura (interim o commit)
  function scrollRowIntoView(el){
    if(!el) return;
    try{ el.scrollIntoView({block:'nearest', behavior:'auto'}); }   // BUG2/2a вЂ” SEMPRE istantaneo: lo smooth interrompibile causava il В«teletrasportoВ» a inizio pagina
    catch(e){ try{ screen.scrollTop=screen.scrollHeight; }catch(_){} }
  }
  let keepScroll=false;   // P2 вЂ” se true, un re-render CONSERVA la posizione di scorrimento (modifiche in-lista)
  function render(){
    const prevScroll = keepScroll ? screen.scrollTop : 0;   // P2 вЂ” cattura lo scroll PRIMA di svuotare lo schermo
    clearTimers(); if(!keepSpeech){ cancelPendingShelf(); Speech.stop(); } S.recording=false;   // Rev.#1 вЂ” annulla il pending PRIMA del flush di stop (uscendo dalla dettatura)
    topbar.innerHTML=''; screen.innerHTML=''; actionbar.innerHTML='';
    actionbar.className='actionbar hidden';
    ({ login:renderLogin, home:renderHome, corsia:renderCorsia,
       dettatura:renderDettatura, stock:renderStock, magazzino:renderMagazzino }[S.screen])();
    // P2 вЂ” dopo aver rinominato/spostato una voce NON si torna in cima: si ripristina lo scorrimento (il
    // browser lo limita da solo se il contenuto e' diventato piu' corto). La navigazione (go) resta in cima.
    screen.scrollTop = keepScroll ? prevScroll : 0;
    keepScroll=false;
    salvaDati();   // ogni modifica dati passa da qui: salvataggio automatico (con debounce)
  }

      {label:'Rinomina scaffale', icon:IC.pencil, onClick:()=>{
        const el=screen.querySelector('.shelf-title .st-wrap');
        // rinomina via inline sull'elemento corretto
        const titles=[...screen.querySelectorAll('.shelf-title')];

      {label:'Sposta scaffale su', icon:IC.up, onClick:()=>{ if(si>0){ c.scaffali.splice(si,1); c.scaffali.splice(si-1,0,sc); renderKeepScroll(); } }},
      {label:'Sposta scaffale giГ№', icon:IC.down, onClick:()=>{ if(si<c.scaffali.length-1){ c.scaffali.splice(si,1); c.scaffali.splice(si+1,0,sc); renderKeepScroll(); } }},
      {label:'Elimina scaffale', icon:IC.trash, danger:true, onClick:()=>confirmDeleteShelf(c,sc,si)},
    ]);
  }
  function confirmDeleteShelf(c,sc,si){

        }} ]);

  function addShelf(){

  /* ============ MICROFONO: STATO E AUTORIZZAZIONE ============ */
  // Se il prototipo gira dentro un riquadro incorporato (es. il visualizzatore di claude.ai),
  // il sito ospite puГІ bloccare il microfono a monte: la richiesta di consenso non compare proprio.
  const INCORPORATO=(()=>{ try{ return window.self!==window.top; }catch(e){ return true; } })();
  // Badge veritiero sullo stato del riconoscimento. kind: 'sala' | 'mag' (aggiunge В« В· o tastieraВ»).
  function speechBadge(kind){
    const tail = kind==='mag' ? ' В· o tastiera' : '';
    if(!Speech.supported)
      return '<span class="dict-sim">'+IC.info+'Riconoscimento non disponibile su questo browser'+tail+'</span>';
    if(Speech.permesso==='denied')
      return '<span class="dict-sim">'+IC.info+(INCORPORATO
        ? 'Microfono bloccato dalla pagina che ospita il prototipo'
        : 'Microfono non autorizzato')+tail+'</span>';
    return '<span class="dict-sim" style="color:var(--ok);background:var(--ok-bg)">'+IC.mic+'Riconoscimento vocale reale (italiano)'+tail+'</span>';
  }
  // Pulsante grande В«Autorizza il microfonoВ»: al tocco chiede il permesso; okв†’onOk, negatoв†’istruzioni.
  function micAuthButton(onOk){
    const b=document.createElement('button'); b.className='mic-auth';
    b.setAttribute('aria-label','Autorizza il microfono');
    b.innerHTML='<span class="ma-emoji">рџЋ™</span><span class="ma-txt"><b>Autorizza il microfono</b>'+

  // Istruzioni pratiche quando il microfono ГЁ bloccato per la pagina.
  function micBloccatoModal(){
    if(INCORPORATO){
      modal('<h3>Microfono bloccato dalla pagina ospite</h3><p>Stai usando il prototipo <b>dentro un\'altra pagina</b> '+

        'la richiesta di consenso non puГІ nemmeno comparire, e per questo non trovi nessuna voce nelle impostazioni. '+
        'Non dipende da te nГ© dall\'app.</p><p>Per provare la dettatura apri il prototipo <b>direttamente</b>: '+
        'sul computer fai doppio clic sul file <b>prototipo\\app-demo.html</b>; sul telefono aprilo con <b>Chrome</b> '+

    }

      'tocca il <b>lucchetto</b> nella barra dell\'indirizzo в†’ <b>Autorizzazioni</b> в†’ <b>Microfono</b> в†’ <b>Consenti</b>, poi riprova.</p>',
      [ {label:'Ho capito', cls:'primary'} ]);

  // Aggiorna la UI quando cambia lo stato del permesso, senza interrompere una dettatura in corso.
  function refreshPermUI(){
    if(S.recording || S.magRecording) return;
    if(S.screen==='dettatura' || S.screen==='magazzino') render();
  }
  Speech.onPermChange = refreshPermUI;

  /* ---------- DETTATURA (Sala, riconoscimento vocale reale) ---------- */
  function renderDettatura(){
    const c=corsia();
    // P1 вЂ” bersaglio predefinito = ULTIMO scaffale (il piu' recente / quello appena creato), NON il primo:
    // cosi', creato un nuovo scaffale e ripresa la dettatura, le voci finiscono nel NUOVO scaffale.
    // Rev.#2 вЂ” NIENTE scaffale-fantasma: se la corsia e' senza scaffali NON se ne crea uno al solo ingresso;
    // lo crea il primo prodotto dettato (commitVoce) o il comando В«nuovo scaffaleВ». `sc` puo' quindi essere null.
    let sc=scaffOf(S.dictSid);
    if(!sc){ sc=c.scaffali.length ? c.scaffali[c.scaffali.length-1] : null; S.dictSid=sc?sc.id:null; }
    setTopbar({
      titleHTML:'<div class="tb-title tb-rec">'+ (S.recording ? '<span class="rec-live" style="width:10px;height:10px;border-radius:50%;background:var(--rec);display:inline-block"></span>' : '') +
        (S.recording?'In ascoltoвЂ¦':'Dettatura')+'</div>',
      subHTML:'<div class="tb-sub">'+esc(c.nome)+' В· '+(sc?esc(sc.titolo):'')+'</div>'
    });

    const area=document.createElement('div');
    area.innerHTML='<div class="dict-area">'+speechBadge('sala')+'</div>';
    // Lista scaffale attivo con le sue voci (tap = correzione ibrida da tastiera)
    const block=document.createElement('div');
    if(sc){
      // P1 вЂ” selettore SEMPRE visibile dello scaffale attivo: dice DOVE finiscono le voci e permette di
      // spostare la dettatura su un ALTRO scaffale (o crearne uno) senza uscire dalla dettatura. Fa anche
      // da intestazione del blocco (sostituisce il vecchio titolo statico, che ripeteva solo il nome).
      const pick=document.createElement('button'); pick.type='button';
      pick.setAttribute('aria-label','Cambia lo scaffale in cui stai dettando');
      pick.className='dict-pick';   // Fix box gigante: la sua icona IC.box era l'unica SVG senza classe -> si dilatava a dimensione intrinseca
      pick.style.cssText='display:flex;align-items:center;gap:8px;width:100%;background:var(--blu-bg);'+
        'border:1px solid rgba(27,91,215,.25);border-radius:12px;padding:11px 12px;margin:2px 0 10px;min-height:56px;'+
        'font-family:inherit;font-size:14px;color:var(--blu);font-weight:700;cursor:pointer;text-align:left';
      pick.innerHTML=IC.box+'<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+
        'Detti in: В«'+esc(sc.titolo||'Nuovo scaffale')+'В»</span><span style="font-weight:800;white-space:nowrap">Cambia в–ѕ</span>';
      pick.onclick=()=>shelfPicker();
      block.appendChild(pick);
      sc.voci.forEach(v=>{
        const row=document.createElement('div'); row.className='voce';
        const nm=document.createElement('div'); nm.className='voce-name'; nm.textContent=v.nome; nm.dataset.vid=v.id;
        // FUNZIONE D вЂ” correggere una voce da tastiera NON deve fermare la dettatura in corso: se si sta
        // registrando, ricostruire con renderDettaturaKeep (Speech resta attivo) e riancorare al fondo; altrimenti render().
        const dopoEdit=()=>{ if(S.recording){ renderDettaturaKeep(); try{ screen.scrollTop=screen.scrollHeight; }catch(e){} } else render(); };
        nm.onclick=()=>inlineEdit(nm, val=>{ v.nome=val; dopoEdit(); });
        const px=document.createElement('button'); px.className='rowbtn'; px.innerHTML=IC.pencil; px.setAttribute('aria-label','Correggi da tastiera');
        px.onclick=()=>inlineEdit(nm, val=>{ v.nome=val; dopoEdit(); });
        // FUNZIONE D/D1 вЂ” cestino: elimina la voce mantenendo la dettatura attiva (renderDettaturaKeep, NON render())
        const kb=document.createElement('button'); kb.className='rowbtn'; kb.innerHTML=IC.trash; kb.setAttribute('aria-label','Elimina voce');
        kb.onclick=()=>{
          const i=sc.voci.indexOf(v); if(i<0) return;
          sc.voci.splice(i,1);
          // FUNZIONE D/D1 вЂ” ricostruzione screen-aware: se si ГЁ tornati alla corsia con lo snackbar ancora
          // visibile, render() ridisegna la schermata corretta; in dettatura si riancora al fondo (BUG2/2b).
          const ricostr=()=>{ if(S.screen==='dettatura'){ renderDettaturaKeep(); try{ screen.scrollTop=screen.scrollHeight; }catch(e){} } else render(); };
          ricostr();
          snackbar('В«'+v.nome+'В» eliminato','Annulla',()=>{ sc.voci.splice(Math.min(i,sc.voci.length),0,v); ricostr(); });
        };
        row.appendChild(nm); row.appendChild(px); row.appendChild(kb); block.appendChild(row);
      });
      // riga provvisoria (compilata durante la dettatura)
      const prov=document.createElement('div'); prov.className='voce'; prov.id='provRow'; prov.style.display='none';
      prov.innerHTML='<div class="voce-name provisional" id="provText"></div>';
      block.appendChild(prov);
    } else {
      // Rev.#2 вЂ” corsia senza scaffali: nessun bersaglio ancora. Non si crea uno scaffale-fantasma al solo ingresso;
      // il primo prodotto dettato (o В«Nuovo scaffaleВ») lo crea da sГ©.
      block.insertAdjacentHTML('beforeend','<div class="dict-info">Ancora nessuno scaffale: detta il primo prodotto вЂ” oppure tocca В«Nuovo scaffaleВ» вЂ” e verrГ  creato da sГ©.</div>');
    }
    // Percorso di autorizzazione / avviso di incompatibilitГ  (in base allo stato reale del microfono)
    if(!Speech.supported){
      block.insertAdjacentHTML('beforeend','<div class="dict-info">Il riconoscimento vocale non ГЁ disponibile su questo browser. '+
        'Usa Chrome su Android. Puoi comunque inserire le voci con la tastiera.</div>');
    } else if(Speech.permesso!=='granted' && !S.recording){
      block.appendChild(micAuthButton(()=>startDictation()));   // permesso concesso в†’ avvia subito la dettatura
    }

    // Microfono grande
    const micDisabled = !Speech.supported;
    const mic=document.createElement('div'); mic.className='mic-wrap';
    mic.innerHTML='<button class="mic-btn'+(S.recording?' rec':'')+'" id="micBtn"'+
      (micDisabled?' aria-disabled="true" style="opacity:.5;cursor:default"':'')+
      ' aria-label="'+(S.recording?'Ferma dettatura':'Avvia dettatura')+'">'+IC.mic+'</button>'+
      '<div class="mic-label'+(S.recording?' on':'')+'" id="micLabel">'+
      (micDisabled?'Riconoscimento non disponibile':(S.recording?'In ascolto вЂ” tocca per fermare':'Tocca il microfono per dettare'))+'</div>';

    area.appendChild(block); area.appendChild(document.createElement('div')).style.height='10px'; area.appendChild(mic);
    screen.appendChild(area);
    if(!micDisabled) document.getElementById('micBtn').onclick=toggleDictation;
    // P4 вЂ” se una richiesta В«nuovo scaffaleВ» e' in sospeso durante la dettatura, ripristina il riquadro di conferma
    if(pendingShelf && S.recording) showShelfConfirm();

    actionbar.className='actionbar';
    actionbar.innerHTML='<button class="btn" id="dNew">'+IC.plus+'Nuovo scaffale</button>'+
                        '<button class="btn btn-primary" id="dFine">'+IC.check+'Fine</button>';
    actionbar.querySelector('#dNew').onclick=()=>{ manualNewShelf(); };
    actionbar.querySelector('#dFine').onclick=()=>{ go('corsia'); };
  }

  function toggleDictation(){
    if(S.recording){ stopDictation(); return; }
    if(!Speech.supported){ return; }                         // mic disabilitato: nessuna azione
    if(Speech.permesso==='granted'){ startDictation(); return; }
    // Permesso non concesso: passa dalla richiesta prima di Speech.start()
    Speech.richiediPermesso(()=>startDictation(), ()=>micBloccatoModal());
  }
  // Avvio effettivo del riconoscimento vocale reale di sala
  function startDictation(){
    if(!Speech.supported || S.recording) return;
    salaQtyAvvisato=false;                                    // R4 вЂ” nuova sessione: l'avviso quantitГ  torna a poter comparire
    cancelPendingShelf();                                     // P4 вЂ” nuova sessione: nessuna richiesta scaffale ereditata
    S.recording=true; renderDettaturaKeep();                 // aggiorna badge/label e nasconde il box В«AutorizzaВ»
    Speech.start(
      (interim)=>{ showProv(interim); },
      (finalTxt)=>{ handleSalaFinal(finalTxt); },
      ()=>{ S.recording=false; renderDettaturaKeep(); }       // avvio fallito: torna allo stato di riposo
    );
  }
  // gestione di ogni risultato В«finaleВ» della dettatura di sala
  function handleSalaFinal(txt){
    hideProv();
    // comando В«nuovo scaffale [nome]В»: confronto senza punteggiatura, per tollerare il punto finale del motore.
    // Si accettano alcune varianti d'esordio (e/poi/crea/apri/aggiungi) e В«scaffale/scaffaliВ».
    const nc=norm(txt).replace(/[^\p{L}\p{N} ]+/gu,' ').replace(/\s+/g,' ').trim();
    const m=nc.match(/^(?:e |poi |crea |apri |aggiungi )?nuovo scaffal[ei](?:\s+(.+))?$/);
    if(m){
      // un eventuale connettore iniziale del nome (В«nuovo scaffale, bibiteВ» в†’ В«e bibiteВ») viene rimosso
      let nome = m[1] ? m[1].replace(/^(?:e |ed |con |il |lo |la |di |chiamato |chiamalo |nome )+/,'').trim() : '';
      onShelfCommand(nome ? cap(nome) : '');
      return;
    }
    // P4 вЂ” completamento a DUE TEMPI: se e' in corso В«nuovo scaffaleВ» in attesa di nome, la frase
    // successiva (entro la finestra) e' il NOME dello scaffale, NON un prodotto. Crea UN solo scaffale.
    if(pendingShelf && pendingShelf.awaitingName && (Date.now()-pendingShelfTs) < ATTESA_NOME_MS){
      const nome=cap(txt.replace(/[.?!вЂ¦]+$/,'').trim());
      if(nome){ pendingShelf.nome=nome; confirmPendingShelf(); return; }
    }
    // P4 вЂ” c'era un В«nuovo scaffaleВ» in attesa di conferma ma l'operatore detta altro: la richiesta si
    // annulla (nessuno scaffale) e la frase viene trattata come un normale prodotto.
    if(pendingShelf) cancelPendingShelf();
    // A9 вЂ” in sala il nome del prodotto si salva PER INTERO, formati compresi (В«Acqua naturale 1,5 litriВ»,
    // В«Coca Cola ZeroВ»): le quantitГ  non si contano in sala, quindi nulla viene staccato dal nome (decisione del committente).
    commitVoce(cap(txt.replace(/[.?!вЂ¦]+$/,'').trim()));
  }
  // Rev.#1 вЂ” cancelPendingShelf() PRIMA di Speech.stop(): lo stop fa un flush sincrono che, con una richiesta
  // В«nuovo scaffaleВ» in sospeso e un nome ancora nel buffer, la confermerebbe creando uno scaffale indesiderato.
  function stopDictation(){ cancelPendingShelf(); S.recording=false; Speech.stop(); clearTimers(); refreshMic(); hideProv(); }
  function refreshMic(){
    const b=document.getElementById('micBtn'), l=document.getElementById('micLabel');
    if(!b) return;
    b.classList.toggle('rec', S.recording);
    l.classList.toggle('on', S.recording);
    l.textContent = S.recording ? 'In ascolto вЂ” tocca per fermare' : 'Tocca il microfono per dettare';
    const rl=topbar.querySelector('.tb-rec'); if(rl) rl.childNodes[1].nodeValue = S.recording?'In ascoltoвЂ¦':'Dettatura';
  }
  function showProv(txt){ const r=document.getElementById('provRow'), t=document.getElementById('provText');
    if(r){ r.style.display='flex'; t.textContent=txt; scrollRowIntoView(r); } }
  function hideProv(){ const r=document.getElementById('provRow'); if(r){ r.style.display='none'; } }

  function commitVoce(text){
    // Rev.#2 вЂ” creazione pigra: al primo prodotto, se non c'e' scaffale attivo, se ne crea uno (niente voci perse).
    let sc=scaffOf(S.dictSid);
    if(!sc){ const c=corsia(); sc={id:nid(), titolo:'Nuovo scaffale', voci:[]}; c.scaffali.push(sc); S.dictSid=sc.id; }
    const last = sc.voci.length ? sc.voci[sc.voci.length-1] : null;
    const nt = norm(text);
    let targetId;
    // BUG1/1b вЂ” rete di sicurezza BIDIREZIONALE: doppione residuo del motore. Se l'ultima voce ГЁ
    // recente (< 6 s) e il suo testo normalizzato ГЁ prefisso del nuovo OPPURE il nuovo ГЁ prefisso del
    // vecchio (inclusa uguaglianza), si sostituisce in-place tenendo la versione piГ№ lunga (piГ№
    // informativa), senza aggiungere una nuova riga.
    const older=norm(last?last.nome:''), newer=nt;
    const dup = last && !editingInline() && older && newer &&   // B1 вЂ” mentre si corregge una riga da tastiera, non fondere nella precedente: la voce dettata resta a sГ© (niente frammento perso)
                (newer.indexOf(older)===0 || older.indexOf(newer)===0) &&
                (Date.now()-tsCommitSala) < FINESTRA_DOPPIONE_MS;
    if(dup){ if(newer.length>=older.length) last.nome=text; targetId=last.id; }
    else { const v={id:nid(), nome:text}; sc.voci.push(v); targetId=v.id; }
    tsCommitSala=Date.now();
    buzz();   // B2 вЂ” conferma tattile in sala
    // B1 вЂ” se si sta correggendo una voce da tastiera, NON ricostruire il DOM (distruggerebbe l'input a fuoco):
    // la voce dettata ГЁ giГ  nel modello e comparirГ  alla chiusura dell'edit. Salva subito, niente re-render.
    if(editingInline()){ salvaDati(); return; }
    // re-render dettatura mantenendo stato
    renderDettaturaKeep();
    // BUG2/2b вЂ” dopo la ricostruzione ancora la vista al fondo (le nuove righe sono sempre in fondo,
    // sopra il microfono): cosГ¬ non si resta mai in cima; poi lo scorrimento istantaneo sulla riga.
    try{ screen.scrollTop=screen.scrollHeight; }catch(e){}
    // flash sulla riga interessata
    const el=[...screen.querySelectorAll('.voce-name')].find(n=>n.dataset.vid===targetId);
    if(el){
      if(!REDUCED) el.closest('.voce').classList.add('flash');
      scrollRowIntoView(el.closest('.voce'));   // R3 вЂ” la visuale segue la riga appena committata
    }
  }
  // re-render leggero della dettatura senza resettare timers/recording
  function renderDettaturaKeep(){
    const wasRec=S.recording; topbar.innerHTML=''; screen.innerHTML=''; actionbar.innerHTML='';
    actionbar.className='actionbar hidden';
    // ricostruisci ma preserva recording flag
    const savedTimers=TIMERS; TIMERS=[]; // non azzerare i timeout in corso
    renderDettatura(); TIMERS=savedTimers.concat(TIMERS); S.recording=wasRec; refreshMic();
    salvaDati();   // la dettatura passa da qui: salvataggio automatico (debounce, non interrompe l'ascolto)
  }
  // P4 вЂ” SOTTOSISTEMA В«nuovo scaffaleВ» a stato singolo: garantisce UN solo scaffale per comando.
  // Riceve il comando vocale; se una richiesta e' gia' in sospeso NON ne crea una seconda.
  function onShelfCommand(nome){
    if(pendingShelf){
      // richiesta gia' in corso: ripetere lo STESSO comando con nome = conferma; con nome nuovo = correzione.
      if(nome){
        if(pendingShelf.nome && norm(pendingShelf.nome)===norm(nome)){ confirmPendingShelf(); return; }
        pendingShelf.nome=nome; pendingShelf.awaitingName=false;
      }
      pendingShelfTs=Date.now(); showShelfConfirm();
      return;
    }
    pendingShelf={ nome:nome||'', awaitingName:!nome }; pendingShelfTs=Date.now();
    showShelfConfirm();
  }
  // Riquadro di conferma UNICO (id fisso): mai due riquadri, mai due scaffali. Si re-inserisce dopo ogni
  // ricostruzione della dettatura finche' la richiesta e' in sospeso (v. fondo di renderDettatura).
  function showShelfConfirm(){
    if(!pendingShelf) return;
    const host=screen.querySelector('.dict-area'); if(!host) return;
    const old=document.getElementById('shelfCmdBox'); if(old) old.remove();
    const box=document.createElement('div'); box.className='cmd-confirm'; box.id='shelfCmdBox';
    const domanda = pendingShelf.awaitingName
      ? 'Nuovo scaffale: <b>diвЂ™ il nome</b> вЂ” oppure tocca вњ“ per crearlo senza nome'
      : 'Creo lo scaffale В«'+esc(pendingShelf.nome)+'В»? Tocca вњ“ вЂ” oppure continua a dettare per annullare';
    box.innerHTML='<div class="ct">'+domanda+'</div><button id="mcOk" aria-label="Conferma nuovo scaffale">'+IC.check+'</button>';
    host.after(box);
    box.querySelector('#mcOk').onclick=()=>confirmPendingShelf();
  }
  function cancelPendingShelf(){
    pendingShelf=null;
    const box=document.getElementById('shelfCmdBox'); if(box) box.remove();
  }
  function confirmPendingShelf(){
    if(!pendingShelf) return;
    const nome=pendingShelf.nome; pendingShelf=null;
    const box=document.getElementById('shelfCmdBox'); if(box) box.remove();
    doNewShelf(nome);
  }
  function doNewShelf(nomeScaffale){
    const c=corsia(); const ns={id:nid(), titolo:nomeScaffale||'Nuovo scaffale', voci:[]}; c.scaffali.push(ns);
    S.dictSid=ns.id; renderDettaturaKeep(); try{ screen.scrollTop=screen.scrollHeight; }catch(e){}
    toast(nomeScaffale ? 'Scaffale В«'+nomeScaffale+'В» creato вЂ” detta pure le sue voci' : 'Nuovo scaffale creato вЂ” detta pure le sue voci');
  }
  // P1 вЂ” selettore dello scaffale in cui si detta: elenco di tutti gli scaffali (l'attivo e' spuntato) +
  // В«Nuovo scaffaleВ». Permette di RIPRENDERE la dettatura su un qualsiasi scaffale, senza uscire.
  function shelfPicker(){
    const c=corsia();
    const items=(c.scaffali||[]).map((s,idx)=>({
      label:(s.id===S.dictSid?'в—Џ ':'')+(s.titolo||('Scaffale '+(idx+1)))+' В· '+s.voci.length+(s.voci.length===1?' voce':' voci'),
      icon:(s.id===S.dictSid?IC.check:IC.box),

    }));

  }
  function setDictShelf(id){

    S.dictSid=id;
    if(S.recording){ renderDettaturaKeep(); } else render();
    try{ screen.scrollTop=screen.scrollHeight; }catch(e){}
    const s=scaffOf(id); if(s) toast('Detti nello scaffale В«'+(s.titolo||'Nuovo scaffale')+'В»');
  }
  function manualNewShelf(){
    cancelPendingShelf();   // Rev.#5 вЂ” il pulsante manuale annulla un'eventuale richiesta vocale in sospeso (niente box fantasma)
    const c=corsia(); const ns={id:nid(), titolo:'Nuovo scaffale', voci:[]}; c.scaffali.push(ns);
    S.dictSid=ns.id;
    // FUNZIONE D вЂ” se si sta dettando, mantenere attivo il riconoscimento (come doNewShelf): render() lo fermerebbe
    // lasciando la UI В«in ascoltoВ» (il vecchio ripristino di wasRec mascherava lo stop senza risolverlo).
    if(S.recording){ renderDettaturaKeep(); try{ screen.scrollTop=screen.scrollHeight; }catch(e){} } else render();
    toast('Nuovo scaffale creato');
